<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tara Rose — Upload Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
[data-theme="light"]{
  --bg:#F9E8DF;--surface:#fff;--surface2:#fdf8f6;--border:#e8d5cc;--border2:#f0e8e4;
  --text:#5C5557;--muted:#9a8a87;--muted2:#a09898;--accent:#5C5557;--accent-fg:#F9E8DF;
  --shadow:0 2px 12px rgba(92,85,87,0.08);--btn:#5C5557;--btn-hover:#4a4344;--btn-fg:#F9E8DF;
  --good:#0F6E56;--good-bg:#E1F5EE;--bad:#A32D2D;--bad-bg:#FCEBEB;
  --logo-color:#5C5557;--toggle-knob:#5C5557;--col-header:#f0e8e4;
}
[data-theme="dark"]{
  --bg:#2D2E37;--surface:#383944;--surface2:#3f4052;--border:rgba(250,248,243,0.09);--border2:rgba(250,248,243,0.05);
  --text:#FAF8F3;--muted:rgba(250,248,243,0.55);--muted2:rgba(250,248,243,0.38);--accent:#FFD4D9;--accent-fg:#2D2E37;
  --shadow:0 2px 16px rgba(0,0,0,0.28);--btn:#FFD4D9;--btn-hover:#ffc0c8;--btn-fg:#2D2E37;
  --good:#99F6E4;--good-bg:rgba(153,246,228,0.12);--bad:#FF9B9B;--bad-bg:rgba(255,155,155,0.12);
  --logo-color:#FAF8F3;--toggle-knob:#FFD4D9;--col-header:#3f4052;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);transition:background .3s,border-color .3s;position:sticky;top:0;z-index:20}
.logo{display:flex;align-items:center;gap:12px}
.logo-text .logo-name{font-family:'DM Sans',sans-serif;font-weight:700;font-size:16px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text);line-height:1}
.logo-text .logo-sub{font-size:9px;letter-spacing:0.26em;text-transform:uppercase;color:var(--muted);margin-top:2px}
.logo-strip{height:2px;width:100px;margin-top:4px;background:linear-gradient(to right,#99F6E4,#EEF3C7,#C4B5FD,#FF9B9B,#FFD4D9);border-radius:2px}
.portal-label{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-top:3px}
.header-right{display:flex;align-items:center;gap:14px}
.toggle-wrap{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
.toggle-lbl{font-size:11px;color:var(--muted);min-width:30px}
.toggle-track{width:38px;height:20px;border-radius:10px;background:var(--border);position:relative;transition:background .3s;flex-shrink:0;border:1px solid var(--border)}
.toggle-thumb{width:14px;height:14px;border-radius:50%;background:var(--toggle-knob);position:absolute;top:2px;left:2px;transition:transform .25s ease,background .3s}
[data-theme="dark"] .toggle-thumb{transform:translateX(18px)}
.logout-btn{padding:6px 14px;border:1px solid var(--border);border-radius:18px;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:border-color .2s,color .2s}
.logout-btn:hover{border-color:var(--bad);color:var(--bad)}

/* PAGE */
.page{max-width:1400px;margin:0 auto;padding:28px 20px 60px}

/* UPLOAD CARD */
.upload-card{background:var(--surface);border-radius:16px;padding:24px;border:1px solid var(--border);box-shadow:var(--shadow);transition:background .3s,border-color .3s;margin-bottom:24px}
.card-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--text);margin-bottom:3px}
.card-sub{font-size:11px;color:var(--muted);letter-spacing:0.05em;margin-bottom:18px}
.upload-grid{display:grid;grid-template-columns:repeat(3,1fr) 1fr;gap:12px;align-items:end}
@media(max-width:700px){.upload-grid{grid-template-columns:1fr 1fr}}
.field{display:flex;flex-direction:column;gap:5px}
.field-label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)}
input[type=text],input[type=password],select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:12px;color:var(--text);background:var(--surface2);font-family:'DM Sans',sans-serif;transition:border-color .2s,background .3s,color .3s;appearance:none}
input:focus,select:focus{outline:none;border-color:var(--accent)}
.drop-zone{border:1.5px dashed var(--border);border-radius:10px;padding:18px 12px;text-align:center;cursor:pointer;background:var(--surface2);transition:border-color .2s}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent)}
.drop-zone p{color:var(--muted);font-size:11px;margin-top:4px}
.drop-zone .drop-icon{font-size:20px;opacity:.4}
.file-name{font-size:11px;color:var(--text);font-weight:500;margin-top:4px}
.btn{width:100%;padding:11px;background:var(--btn);color:var(--btn-fg);border:none;border-radius:10px;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:700;transition:background .2s,opacity .2s;white-space:nowrap}
.btn:hover{background:var(--btn-hover)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.status{padding:10px 14px;border-radius:10px;font-size:12px;margin-top:10px;text-align:center;display:none}
.status.success{background:var(--good-bg);color:var(--good);display:block}
.status.error{background:var(--bad-bg);color:var(--bad);display:block}
.err{color:var(--bad);font-size:13px;text-align:center;margin-top:8px}

/* 5-COLUMN GRID */
.branches-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
@media(max-width:1100px){.branches-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:700px){.branches-grid{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.branches-grid{grid-template-columns:1fr}}
.branch-col{background:var(--surface);border-radius:14px;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;transition:background .3s,border-color .3s}
.branch-col-header{padding:14px 16px;background:var(--col-header);border-bottom:1px solid var(--border);transition:background .3s}
.branch-col-name{font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text)}
.branch-col-sub{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:0.05em}
.branch-col-accent{height:2px;border-radius:2px;margin-top:8px}
.branch-col-body{padding:10px 12px}

/* YEAR/MONTH */
.year-section{margin-bottom:8px}
.year-toggle{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:8px;cursor:pointer;background:var(--surface2);border:1px solid var(--border2);font-size:11px;font-weight:700;color:var(--text);letter-spacing:0.06em;user-select:none;transition:background .2s;margin-bottom:4px}
.year-toggle:hover{background:var(--border2)}
.year-arrow{font-size:10px;transition:transform .2s;color:var(--muted)}
.year-arrow.open{transform:rotate(180deg)}
.month-section{margin-left:4px;margin-bottom:4px}
.month-toggle{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:7px;cursor:pointer;font-size:11px;color:var(--muted);letter-spacing:0.05em;user-select:none;transition:background .15s}
.month-toggle:hover{background:var(--surface2);color:var(--text)}
.month-arrow{font-size:9px;transition:transform .2s}
.month-arrow.open{transform:rotate(180deg)}
.month-count{font-size:10px;color:var(--muted2);margin-left:4px}

/* WEEK ITEMS */
.weeks-list{margin-left:8px;padding-bottom:4px}
.week-item{padding:7px 8px;border-radius:7px;margin-bottom:3px;border:1px solid var(--border2);background:var(--surface2);transition:background .2s}
.week-item:hover{background:var(--border2)}
.week-row{display:flex;align-items:center;justify-content:space-between;gap:6px}
.week-label-text{font-size:11px;color:var(--text);font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.week-date{font-size:10px;color:var(--muted2);margin-top:1px}
.week-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.icon-btn{background:none;border:none;cursor:pointer;padding:3px 5px;color:var(--muted);font-size:13px;line-height:1;transition:color .2s;border-radius:5px}
.icon-btn:hover{color:var(--text)}
.icon-btn.del:hover{color:var(--bad)}

/* EDIT AREA */
.edit-area{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--border2)}
.edit-input{padding:7px 10px;border:1px solid var(--accent);border-radius:8px;font-size:12px;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;width:100%;transition:border-color .2s}
.edit-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,212,217,0.15)}
.edit-btns{display:flex;gap:6px;margin-top:7px}
.save-btn{flex:1;padding:7px 0;background:var(--good-bg);color:var(--good);border:1px solid var(--good);border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:0.08em;text-transform:uppercase;transition:opacity .2s}
.save-btn:hover{opacity:.8}
.save-btn:disabled{opacity:.4;cursor:not-allowed}
.cancel-btn{padding:7px 12px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:color .2s,border-color .2s}
.cancel-btn:hover{color:var(--text);border-color:var(--text)}

.empty-col{font-size:11px;color:var(--muted2);text-align:center;padding:16px 8px}

/* LOGIN */
.login-wrap{max-width:380px;margin:80px auto;background:var(--surface);border-radius:16px;padding:32px;border:1px solid var(--border);box-shadow:var(--shadow)}
.pw-field-wrap{position:relative}
.pw-field-wrap input{padding-right:40px}
.pw-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;line-height:1;padding:2px 4px;transition:color .2s}
.pw-eye:hover{color:var(--text)}

/* CONFIRM MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);opacity:0;transition:opacity .2s;pointer-events:none}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 26px;max-width:400px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,0.35);transform:translateY(10px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--text);margin-bottom:6px}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6}
.modal-change{background:var(--surface2);border-radius:10px;padding:12px 14px;margin-bottom:18px;font-size:12px;line-height:1.7;border:1px solid var(--border2)}
.modal-from{color:var(--muted);text-decoration:line-through}
.modal-to{color:var(--good);font-weight:600}
.modal-btns{display:flex;gap:8px}
.modal-confirm{flex:1;padding:10px;background:var(--good-bg);color:var(--good);border:1px solid var(--good);border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:0.08em;text-transform:uppercase;transition:opacity .2s}
.modal-confirm:hover{opacity:.8}
.modal-cancel{padding:10px 16px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:10px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:color .2s,border-color .2s}
.modal-cancel:hover{color:var(--text);border-color:var(--text)}
</style>
</head>
<body>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <div class="modal-title">Save Changes?</div>
    <div class="modal-sub">You're about to rename this week entry.</div>
    <div class="modal-change">
      <div class="modal-from" id="modalFrom"></div>
      <div style="font-size:11px;color:var(--muted2);margin:3px 0">↓ new name</div>
      <div class="modal-to" id="modalTo"></div>
    </div>
    <div class="modal-btns">
      <button class="modal-confirm" id="modalConfirmBtn">Yes, Save It</button>
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<header>
  <div class="logo">
    <div class="logo-text">
      <div class="logo-name">Tara Rose</div>
      <div class="logo-sub">Salon</div>
      <div class="logo-strip"></div>
      <div class="portal-label">Upload Portal</div>
    </div>
  </div>
  <div class="header-right">
    <button class="logout-btn" id="logoutBtn" style="display:none" onclick="logout()">Log out</button>
    <div class="toggle-wrap" onclick="toggleTheme()" role="button">
      <span class="toggle-lbl" id="themeLbl">Dark</span>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
    </div>
  </div>
</header>

<div class="page">
  <!-- LOGIN -->
  <div id="loginSection" class="login-wrap">
    <div class="card-title">Admin Access</div>
    <div class="card-sub" style="margin-bottom:16px">Enter your password to continue</div>
    <div class="field" style="margin-bottom:12px">
      <label class="field-label">Password</label>
      <div class="pw-field-wrap">
        <input type="password" id="pwInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
        <button class="pw-eye" id="pwEye" type="button" onclick="togglePwVis()" title="Show/hide password">👁️</button>
      </div>
    </div>
    <button class="btn" onclick="login()">Enter Portal</button>
    <div class="err" id="loginErr"></div>
  </div>

  <!-- PORTAL -->
  <div id="portalSection" style="display:none">
    <div class="upload-card">
      <div class="card-title">Upload Weekly Data</div>
      <div class="card-sub">Select branch and week, then upload your TSV file</div>
      <div class="upload-grid">
        <div class="field">
          <label class="field-label">Branch</label>
          <select id="branchSelect">
            <option value="KCA">Khalifa City (KCA)</option>
            <option value="SAA">Saadiyat (SAA)</option>
            <option value="MC">Motor City (MC)</option>
            <option value="AQ">AQ Ladies</option>
            <option value="FRT">Fratelli Barber</option>
          </select>
        </div>
        <div class="field">
          <label class="field-label">Week Label</label>
          <input type="text" id="weekLabel" placeholder="e.g. March 2026 Week 4 (23–29)">
        </div>
        <div class="field">
          <label class="field-label">TSV File (WEEKEND sheet)</label>
          <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <div class="drop-icon">↑</div>
            <p>Click to browse or drag &amp; drop</p>
            <div class="file-name" id="fileName"></div>
          </div>
          <input type="file" id="fileInput" accept=".tsv,.txt" style="display:none">
        </div>
        <div class="field" style="align-self:end">
          <button class="btn" id="uploadBtn" onclick="uploadData()" disabled>Upload</button>
        </div>
      </div>
      <div class="status" id="statusMsg"></div>
    </div>
    <div class="branches-grid" id="branchesGrid"></div>
  </div>
</div>

<script>
const PASS = 'AbuDhabi2026@';
const SUPA_URL = 'https://gvijxenafoowajqktqvd.supabase.co';
const SUPA_KEY = 'sb_publishable_e5o0vPayb-6552oARTeu7Q_KoqfT7xO';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

const BRANCHES = {
  KCA:{ name:'Khalifa City', sub:'KCA',         color:'#FFD4D9' },
  SAA:{ name:'Saadiyat',     sub:'SAA',         color:'#C4B5FD' },
  MC: { name:'Motor City',   sub:'MC',          color:'#99F6E4' },
  AQ: { name:'AQ Ladies',    sub:'Al Quoz',     color:'#FF9B9B' },
  FRT:{ name:'Fratelli',     sub:'Barber Shop', color:'#EEF3C7' },
};

let selectedFile = null;
let allData = [];
const openState = {};

// ── THEME ──
function toggleTheme() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('themeLbl').textContent = dark ? 'Light' : 'Dark';
}

// ── PASSWORD EYE ──
function togglePwVis() {
  const inp = document.getElementById('pwInput');
  const eye = document.getElementById('pwEye');
  const hidden = inp.type === 'password';
  inp.type = hidden ? 'text' : 'password';
  eye.textContent = hidden ? '🙈' : '👁️';
}

// ── AUTH ──
window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('tr_auth') === '1') showPortal();

  document.getElementById('fileInput').addEventListener('change', e => {
    selectedFile = e.target.files[0];
    document.getElementById('fileName').textContent = selectedFile ? selectedFile.name : '';
    document.getElementById('uploadBtn').disabled = !selectedFile;
  });

  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('dragover');
    selectedFile = e.dataTransfer.files[0];
    document.getElementById('fileName').textContent = selectedFile ? selectedFile.name : '';
    document.getElementById('uploadBtn').disabled = !selectedFile;
  });
});

function login() {
  if (document.getElementById('pwInput').value === PASS) {
    sessionStorage.setItem('tr_auth', '1');
    showPortal();
  } else {
    document.getElementById('loginErr').textContent = 'Incorrect password.';
  }
}

function showPortal() {
  document.getElementById('loginSection').style.display = 'none';
  document.getElementById('portalSection').style.display = 'block';
  document.getElementById('logoutBtn').style.display = 'inline-block';
  loadData();
}

function logout() {
  sessionStorage.removeItem('tr_auth');
  document.getElementById('portalSection').style.display = 'none';
  document.getElementById('loginSection').style.display = 'block';
  document.getElementById('logoutBtn').style.display = 'none';
  document.getElementById('pwInput').value = '';
  document.getElementById('loginErr').textContent = '';
}

// ── HELPERS ──
function extractYear(label, uploaded_at) {
  const m = label && label.match(/20\d\d/);
  if (m) return m[0];
  return uploaded_at ? new Date(uploaded_at).getFullYear().toString() : '2026';
}
function extractMonth(label, uploaded_at) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  for (const mo of months) { if (label && label.includes(mo)) return mo; }
  if (uploaded_at) return new Date(uploaded_at).toLocaleDateString('en-GB', { month: 'short' });
  return '—';
}
const MONTH_ORDER = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── LOAD ──
async function loadData() {
  const { data, error } = await sb.from('weekly_data').select('id,branch,week_label,uploaded_at').order('uploaded_at', { ascending: false });
  allData = (error || !data) ? [] : data;
  renderColumns();
}

// ── RENDER ──
function renderColumns() {
  const grid = document.getElementById('branchesGrid');
  grid.innerHTML = Object.entries(BRANCHES).map(([code, info]) => {
    const rows = allData.filter(d => d.branch === code);
    const byYear = {};
    rows.forEach(d => {
      const yr = extractYear(d.week_label, d.uploaded_at);
      const mo = extractMonth(d.week_label, d.uploaded_at);
      if (!byYear[yr]) byYear[yr] = {};
      if (!byYear[yr][mo]) byYear[yr][mo] = [];
      byYear[yr][mo].push(d);
    });
    const years = Object.keys(byYear).sort((a, b) => b - a);

    return `
      <div class="branch-col">
        <div class="branch-col-header">
          <div class="branch-col-name">${info.name}</div>
          <div class="branch-col-sub">${info.sub}</div>
          <div class="branch-col-accent" style="background:${info.color}"></div>
        </div>
        <div class="branch-col-body">
          ${rows.length === 0 ? `<div class="empty-col">No uploads yet</div>` :
            years.map(yr => {
              const yrKey = code + '_' + yr;
              if (openState[yrKey] === undefined) openState[yrKey] = true;
              const yrOpen = openState[yrKey];
              const moKeys = Object.keys(byYear[yr]).sort((a, b) => MONTH_ORDER.indexOf(b) - MONTH_ORDER.indexOf(a));
              return `
                <div class="year-section">
                  <div class="year-toggle" onclick="toggleSection('${yrKey}')">
                    <span>${yr}</span>
                    <span class="year-arrow ${yrOpen ? 'open' : ''}">▼</span>
                  </div>
                  <div id="ys_${yrKey}" style="display:${yrOpen ? 'block' : 'none'}">
                    ${moKeys.map(mo => {
                      const moKey = yrKey + '_' + mo;
                      if (openState[moKey] === undefined) openState[moKey] = true;
                      const moOpen = openState[moKey];
                      const moRows = byYear[yr][mo];
                      return `
                        <div class="month-section">
                          <div class="month-toggle" onclick="toggleSection('${moKey}')">
                            <span>${mo}<span class="month-count">(${moRows.length})</span></span>
                            <span class="month-arrow ${moOpen ? 'open' : ''}">▼</span>
                          </div>
                          <div id="ms_${moKey}" style="display:${moOpen ? 'block' : 'none'}">
                            <div class="weeks-list">
                              ${moRows.map(w => weekItemHTML(w)).join('')}
                            </div>
                          </div>
                        </div>`;
                    }).join('')}
                  </div>
                </div>`;
            }).join('')
          }
        </div>
      </div>`;
  }).join('');
}

// ── WEEK ITEM — no inline onclick hacks, uses data-id ──
function weekItemHTML(w) {
  const date = new Date(w.uploaded_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  // Safe HTML escaping for the input value attribute
  const safeVal = (w.week_label || '')
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  return `
    <div class="week-item" id="item_${w.id}" data-id="${w.id}" data-label="${safeVal}">
      <div class="week-row">
        <div>
          <div class="week-label-text" id="lbl_${w.id}">${w.week_label}</div>
          <div class="week-date">${date}</div>
        </div>
        <div class="week-actions">
          <button class="icon-btn" title="Edit" onclick="startEdit('${w.id}')">✏️</button>
          <button class="icon-btn del" title="Delete" onclick="deleteWeek('${w.id}')">✕</button>
        </div>
      </div>
      <div class="edit-area" id="editarea_${w.id}">
        <input class="edit-input" id="einp_${w.id}" type="text" value="${safeVal}"
          placeholder="Enter new week label"
          onkeydown="if(event.key==='Escape')cancelEdit('${w.id}')">
        <div class="edit-btns">
          <button class="save-btn" id="sbtn_${w.id}" onclick="requestSave('${w.id}')">💾 Save Changes</button>
          <button class="cancel-btn" onclick="cancelEdit('${w.id}')">Cancel</button>
        </div>
      </div>
    </div>`;
}

// ── TOGGLE SECTIONS ──
function toggleSection(key) {
  openState[key] = !openState[key];
  const el = document.getElementById('ys_' + key) || document.getElementById('ms_' + key);
  if (!el) return;
  el.style.display = openState[key] ? 'block' : 'none';
  const arrow = el.previousElementSibling && el.previousElementSibling.querySelector('.year-arrow,.month-arrow');
  if (arrow) arrow.classList.toggle('open', openState[key]);
}

// ── EDIT ──
function startEdit(id) {
  document.getElementById('lbl_' + id).style.opacity = '0.4';
  document.getElementById('editarea_' + id).style.display = 'block';
  const inp = document.getElementById('einp_' + id);
  inp.focus();
  inp.select();
}

function cancelEdit(id) {
  document.getElementById('lbl_' + id).style.opacity = '1';
  document.getElementById('editarea_' + id).style.display = 'none';
  // reset input to original value
  const item = document.getElementById('item_' + id);
  if (item) document.getElementById('einp_' + id).value = item.dataset.label;
}

// ── MODAL ──
let _pendingSaveId = null;
let _pendingSaveVal = null;

function requestSave(id) {
  const inp = document.getElementById('einp_' + id);
  const val = inp.value.trim();
  if (!val) { inp.focus(); inp.style.borderColor = 'var(--bad)'; return; }

  const oldVal = document.getElementById('lbl_' + id).textContent.trim();
  if (val === oldVal) { cancelEdit(id); return; }

  _pendingSaveId = id;
  _pendingSaveVal = val;

  document.getElementById('modalFrom').textContent = oldVal;
  document.getElementById('modalTo').textContent = val;
  document.getElementById('modalConfirmBtn').onclick = confirmSave;
  document.getElementById('confirmModal').classList.add('open');
}

function closeModal() {
  document.getElementById('confirmModal').classList.remove('open');
  _pendingSaveId = null;
  _pendingSaveVal = null;
}

// Close modal on overlay click
document.getElementById('confirmModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

async function confirmSave() {
  const id = _pendingSaveId;
  const val = _pendingSaveVal;
  closeModal();

  const sbtn = document.getElementById('sbtn_' + id);
  sbtn.textContent = '⏳ Saving...';
  sbtn.disabled = true;

  const { error } = await sb.from('weekly_data').update({ week_label: val }).eq('id', id);

  if (error) {
    sbtn.textContent = '💾 Save Changes';
    sbtn.disabled = false;
    alert('Save failed: ' + error.message);
  } else {
    // Update label in place — no full re-render needed
    document.getElementById('lbl_' + id).textContent = val;
    // Update data-label so cancel works correctly after save
    const item = document.getElementById('item_' + id);
    if (item) item.dataset.label = val.replace(/"/g, '&quot;');
    // Update allData in memory
    const row = allData.find(d => String(d.id) === String(id));
    if (row) row.week_label = val;
    cancelEdit(id);
  }
}

// ── DELETE ──
async function deleteWeek(id) {
  if (!confirm('Delete this entry? This cannot be undone.')) return;
  await sb.from('weekly_data').delete().eq('id', id);
  await loadData();
}

// ── UPLOAD ──
function parseAED(s) { return parseFloat((s||'').replace(/AED|,|\s/g,'').replace(/[^\d.\-]/g,'')) || 0; }
function parseHairRow(c) { return {name:c[0],salon:parseInt(c[3])||0,newC:parseInt(c[4])||0,rebooked:parseInt(c[5])||0,rebookPct:parseFloat((c[6]||'').replace('%',''))||0,total:parseInt(c[7])||0,hairSales:parseAED(c[8]),hairSalesNet:parseAED(c[9]),avgBill:parseFloat(c[10])||0,col:parseInt(c[11])||0,colPct:parseFloat((c[12]||'').replace('%',''))||0,retail:parseAED(c[22]),treatments:parseAED(c[29]),totalNet:parseAED(c[31])}; }
function parseBeautyRow(c) { return {name:c[0],total:parseInt(c[7])||0,beautySales:parseAED(c[8]),beautyNet:parseAED(c[9]),avgBill:parseFloat(c[10])||0,rebookPct:parseFloat((c[6]||'').replace('%',''))||0}; }

function parseTSV(text) {
  const lines = text.split('\n').map(l => l.split('\t'));
  const hairStaff = [], beautyStaff = [];
  let summary = {}, inBeauty = false, hairHeaderFound = false, beautyHeaderFound = false;
  for (let i = 0; i < lines.length; i++) {
    const cols = lines[i].map(c => (c||'').trim());
    const first = cols[0];
    if (!first && cols.every(c => !c)) continue;
    if (cols.includes('HAIR SALES TAKE') && !inBeauty) { hairHeaderFound = true; continue; }
    if (cols.includes('BEAUTY SALES TAKE')) { inBeauty = true; beautyHeaderFound = true; continue; }
    if (first === 'TOTAL CLIENTS')     { summary.totalClients = parseInt(cols[1])||0; continue; }
    if (first === 'HAIR RETAIL SALES') { summary.hairRetail = parseAED(cols[1]); summary.hairRetailPct = parseFloat(cols[2])||0; continue; }
    if (first === 'TREATMENT SALES')   { summary.treatmentSales = parseAED(cols[1]); summary.treatmentPct = parseFloat(cols[2])||0; continue; }
    if (first === 'COL TAKE AED')      { summary.colTake = parseAED(cols[1]); summary.colPct = parseFloat(cols[2])||0; continue; }
    if (first === 'BEAUTY SALES')      { summary.beautySales = parseAED(cols[1]); summary.beautyPct = parseFloat(cols[2])||0; continue; }
    if (first === 'NET SALON TAKE')    { summary.netTake = parseAED(cols[1]); summary.avgBill = parseFloat(cols[2])||0; continue; }
    if (!inBeauty && hairHeaderFound && first && first !== 'STAFF' && first !== 'TOTALS') { const s = parseHairRow(cols); if (s && s.total > 0) hairStaff.push(s); }
    if (inBeauty && beautyHeaderFound && first && first !== 'STAFF' && first !== 'TOTALS') { const s = parseBeautyRow(cols); if (s && s.total > 0) beautyStaff.push(s); }
    if (!inBeauty && first === 'TOTALS') { summary.totals = parseHairRow(cols); }
  }
  return { hairStaff, beautyStaff, summary };
}

async function uploadData() {
  const branch = document.getElementById('branchSelect').value;
  const weekLabel = document.getElementById('weekLabel').value.trim();
  const btn = document.getElementById('uploadBtn');
  const statusEl = document.getElementById('statusMsg');
  if (!weekLabel) { alert('Please enter a week label.'); return; }
  if (!selectedFile) { alert('Please select a TSV file.'); return; }
  btn.disabled = true; btn.textContent = 'Uploading...'; statusEl.className = 'status';
  const text = await selectedFile.text();
  const data = parseTSV(text);
  const { error } = await sb.from('weekly_data').insert({ branch, week_label: weekLabel, data });
  if (error) {
    statusEl.className = 'status error';
    statusEl.textContent = 'Upload failed: ' + error.message;
  } else {
    statusEl.className = 'status success';
    statusEl.textContent = 'Uploaded successfully!';
    document.getElementById('weekLabel').value = '';
    selectedFile = null;
    document.getElementById('fileName').textContent = '';
    document.getElementById('uploadBtn').disabled = true;
    await loadData();
  }
  btn.disabled = false; btn.textContent = 'Upload';
}
