<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tara Rose — Upload Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

[data-theme="light"]{
  --bg:#F9E8DF;--surface:#fff;--surface2:#fdf8f6;
  --border:#e8d5cc;--border2:#f0e8e4;
  --text:#5C5557;--muted:#9a8a87;--muted2:#a09898;
  --accent:#5C5557;--accent-fg:#F9E8DF;
  --shadow:0 2px 12px rgba(92,85,87,0.08);
  --btn:#5C5557;--btn-hover:#4a4344;--btn-fg:#F9E8DF;
  --good:#0F6E56;--good-bg:#E1F5EE;
  --bad:#A32D2D;--bad-bg:#FCEBEB;
  --logo-color:#5C5557;--toggle-knob:#5C5557;
}
[data-theme="dark"]{
  --bg:#2D2E37;--surface:#383944;--surface2:#3f4052;
  --border:rgba(250,248,243,0.09);--border2:rgba(250,248,243,0.05);
  --text:#FAF8F3;--muted:rgba(250,248,243,0.55);--muted2:rgba(250,248,243,0.38);
  --accent:#FFD4D9;--accent-fg:#2D2E37;
  --shadow:0 2px 16px rgba(0,0,0,0.28);
  --btn:#FFD4D9;--btn-hover:#ffc0c8;--btn-fg:#2D2E37;
  --good:#99F6E4;--good-bg:rgba(153,246,228,0.12);
  --bad:#FF9B9B;--bad-bg:rgba(255,155,155,0.12);
  --logo-color:#FAF8F3;--toggle-knob:#FFD4D9;
}

body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}

/* HEADER */
header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:16px 24px;display:flex;align-items:center;justify-content:space-between;
  box-shadow:var(--shadow);transition:background .3s,border-color .3s;
  position:sticky;top:0;z-index:20;
}
.logo{display:flex;align-items:center;gap:12px}
.logo-text .logo-name{font-family:'DM Sans',sans-serif;font-weight:700;font-size:17px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text);line-height:1;transition:color .3s}
.logo-text .logo-sub{font-size:9px;letter-spacing:0.26em;text-transform:uppercase;color:var(--muted);margin-top:2px}
.logo-strip{height:2px;width:110px;margin-top:5px;background:linear-gradient(to right,#99F6E4,#EEF3C7,#C4B5FD,#FF9B9B,#FFD4D9);border-radius:2px}
.portal-label{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-top:4px}

.toggle-wrap{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
.toggle-lbl{font-size:11px;color:var(--muted);min-width:30px}
.toggle-track{width:38px;height:20px;border-radius:10px;background:var(--border);position:relative;transition:background .3s;flex-shrink:0;border:1px solid var(--border)}
.toggle-thumb{width:14px;height:14px;border-radius:50%;background:var(--toggle-knob);position:absolute;top:2px;left:2px;transition:transform .25s ease,background .3s}
[data-theme="dark"] .toggle-thumb{transform:translateX(18px)}

/* LAYOUT */
.page{max-width:600px;margin:0 auto;padding:32px 20px 60px}

/* CARD */
.card{background:var(--surface);border-radius:16px;padding:28px;border:1px solid var(--border);box-shadow:var(--shadow);transition:background .3s,border-color .3s;margin-bottom:16px}
.card-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--text);margin-bottom:4px}
.card-sub{font-size:11px;color:var(--muted);letter-spacing:0.05em;margin-bottom:20px}

/* FIELDS */
.field{margin-bottom:14px}
.field-label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px}
input[type=text],input[type=password],select{
  width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:10px;
  font-size:13px;color:var(--text);background:var(--surface2);
  font-family:'DM Sans',sans-serif;transition:border-color .2s,background .3s,color .3s;
  appearance:none;
}
input:focus,select:focus{outline:none;border-color:var(--accent)}

/* BTN */
.btn{
  width:100%;padding:12px;background:var(--btn);color:var(--btn-fg);
  border:none;border-radius:10px;font-size:12px;letter-spacing:0.12em;
  text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;
  font-weight:700;transition:background .2s,opacity .2s;
}
.btn:hover{background:var(--btn-hover)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-secondary{
  background:transparent;color:var(--muted);border:1px solid var(--border);
  padding:7px 14px;border-radius:8px;font-size:11px;letter-spacing:0.1em;
  text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;
  font-weight:500;transition:all .2s;
}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}

/* DROP ZONE */
.drop-zone{
  border:1.5px dashed var(--border);border-radius:12px;padding:28px;
  text-align:center;cursor:pointer;background:var(--surface2);
  transition:border-color .2s;
}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent)}
.drop-zone p{color:var(--muted);font-size:13px;margin-top:6px}
.drop-zone .drop-icon{font-size:28px;opacity:.4}
.file-name{margin-top:6px;font-size:12px;color:var(--text);font-weight:500}

/* STATUS */
.status{padding:11px 16px;border-radius:10px;font-size:13px;margin-top:12px;text-align:center;display:none}
.status.success{background:var(--good-bg);color:var(--good);display:block}
.status.error{background:var(--bad-bg);color:var(--bad);display:block}
.err{color:var(--bad);font-size:13px;text-align:center;margin-top:8px}

/* WEEKS LIST */
.section-label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.week-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:11px 14px;background:var(--surface2);border-radius:10px;
  margin-bottom:8px;border:1px solid var(--border);transition:background .3s;
}
.week-item-left{display:flex;flex-direction:column;gap:2px}
.week-label-text{font-size:13px;color:var(--text);font-weight:500}
.week-branch-tag{font-size:10px;color:var(--muted);letter-spacing:0.06em}
.week-item-right{display:flex;align-items:center;gap:8px}
.edit-input{
  padding:5px 10px;border:1px solid var(--accent);border-radius:7px;
  font-size:12px;background:var(--surface);color:var(--text);
  font-family:'DM Sans',sans-serif;width:180px;
}
.edit-input:focus{outline:none}
.icon-btn{
  background:none;border:none;cursor:pointer;padding:4px;
  color:var(--muted);font-size:16px;line-height:1;transition:color .2s;border-radius:6px;
}
.icon-btn:hover.edit{color:var(--accent)}
.icon-btn:hover.save{color:var(--good)}
.icon-btn:hover.del{color:var(--bad)}

/* RESPONSIVE */
@media(max-width:480px){
  .page{padding:20px 14px 48px}
  .card{padding:20px}
  header{padding:14px 16px}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="40" height="40" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M22 36 C22 36 22 22 22 14 C22 10 19 7 16 9 C13 11 13 16 16 20 C18 23 22 25 22 36Z" stroke="var(--logo-color)" stroke-width="1.4" fill="none" stroke-linejoin="round"/>
      <path d="M22 36 C22 36 22 22 22 14 C22 10 25 7 28 9 C31 11 31 16 28 20 C26 23 22 25 22 36Z" stroke="var(--logo-color)" stroke-width="1.4" fill="none" stroke-linejoin="round"/>
      <path d="M22 14 C22 14 22 9 22 7" stroke="var(--logo-color)" stroke-width="1.3" stroke-linecap="round"/>
      <path d="M16 20 C16 20 10 18 8 14 C6 10 8 7 11 8 C14 9 15 13 16 20Z" stroke="var(--logo-color)" stroke-width="1.3" fill="none" stroke-linejoin="round"/>
      <path d="M28 20 C28 20 34 18 36 14 C38 10 36 7 33 8 C30 9 29 13 28 20Z" stroke="var(--logo-color)" stroke-width="1.3" fill="none" stroke-linejoin="round"/>
    </svg>
    <div class="logo-text">
      <div class="logo-name">Tara Rose</div>
      <div class="logo-sub">Salon</div>
      <div class="logo-strip"></div>
      <div class="portal-label">Upload Portal</div>
    </div>
  </div>
  <div class="toggle-wrap" onclick="toggleTheme()" role="button" aria-label="Toggle theme">
    <span class="toggle-lbl" id="themeLbl">Dark</span>
    <div class="toggle-track"><div class="toggle-thumb"></div></div>
  </div>
</header>

<div class="page">
  <!-- LOGIN -->
  <div id="loginSection" class="card">
    <div class="card-title">Admin Access</div>
    <div class="card-sub">Enter your password to continue</div>
    <div class="field">
      <label class="field-label">Password</label>
      <input type="password" id="pwInput" placeholder="••••••••••" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn" onclick="login()">Enter Portal</button>
    <div class="err" id="loginErr"></div>
  </div>

  <!-- UPLOAD SECTION -->
  <div id="uploadSection" style="display:none">

    <div class="card">
      <div class="card-title">Upload Weekly Data</div>
      <div class="card-sub">Select branch, label the week, then upload your TSV file</div>

      <div class="field">
        <label class="field-label">Branch</label>
        <select id="branchSelect">
          <option value="KCA">KCA — Khalifa City</option>
          <option value="SAA">SAA — Saadiyat</option>
          <option value="MC">Motor City</option>
          <option value="AQ">AQ Ladies</option>
        </select>
      </div>

      <div class="field">
        <label class="field-label">Week Label</label>
        <input type="text" id="weekLabel" placeholder="e.g. March 2026 Week 4 (23–29)">
      </div>

      <div class="field">
        <label class="field-label">TSV File (WEEKEND sheet)</label>
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
          <div class="drop-icon">↑</div>
          <p>Click to browse or drag &amp; drop</p>
          <div class="file-name" id="fileName"></div>
        </div>
        <input type="file" id="fileInput" accept=".tsv,.txt" style="display:none">
      </div>

      <button class="btn" id="uploadBtn" onclick="uploadData()" disabled>Upload to Dashboard</button>
      <div class="status" id="statusMsg"></div>
    </div>

    <!-- UPLOADED WEEKS -->
    <div class="card">
      <div class="section-label">Uploaded Weeks</div>
      <div id="weeksItems"><p style="font-size:13px;color:var(--muted)">No data uploaded yet.</p></div>
    </div>

  </div>
</div>

<script>
const PASS = 'AbuDhabi2026@';
const SUPA_URL = 'https://gvijxenafoowajqktqvd.supabase.co';
const SUPA_KEY = 'sb_publishable_e5o0vPayb-6552oARTeu7Q_KoqfT7xO';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

let selectedFile = null;
let editingId = null;

// THEME
function toggleTheme() {
  const html = document.documentElement;
  const dark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('themeLbl').textContent = dark ? 'Light' : 'Dark';
}

// LOGIN
function login() {
  const pw = document.getElementById('pwInput').value;
  if (pw === PASS) {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('uploadSection').style.display = 'block';
    loadWeeks();
  } else {
    document.getElementById('loginErr').textContent = 'Incorrect password.';
  }
}

// FILE INPUT
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('fileInput').addEventListener('change', e => {
    selectedFile = e.target.files[0];
    document.getElementById('fileName').textContent = selectedFile ? selectedFile.name : '';
    document.getElementById('uploadBtn').disabled = !selectedFile;
  });

  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('dragover');
    selectedFile = e.dataTransfer.files[0];
    document.getElementById('fileName').textContent = selectedFile ? selectedFile.name : '';
    document.getElementById('uploadBtn').disabled = !selectedFile;
  });
});

// PARSE TSV
function parseAED(s) { return parseFloat((s||'').replace(/AED|,|\s/g,'').replace(/[^\d.\-]/g,''))||0; }
function parseHairRow(c) {
  return {
    name:c[0],salon:parseInt(c[3])||0,newC:parseInt(c[4])||0,
    rebooked:parseInt(c[5])||0,rebookPct:parseFloat((c[6]||'').replace('%',''))||0,
    total:parseInt(c[7])||0,hairSales:parseAED(c[8]),hairSalesNet:parseAED(c[9]),
    avgBill:parseFloat(c[10])||0,col:parseInt(c[11])||0,colPct:parseFloat((c[12]||'').replace('%',''))||0,
    retail:parseAED(c[22]),treatments:parseAED(c[29]),totalNet:parseAED(c[31])
  };
}
function parseBeautyRow(c) {
  return {
    name:c[0],total:parseInt(c[7])||0,beautySales:parseAED(c[8]),
    beautyNet:parseAED(c[9]),avgBill:parseFloat(c[10])||0,
    rebookPct:parseFloat((c[6]||'').replace('%',''))||0
  };
}
function parseTSV(text) {
  const lines = text.split('\n').map(l=>l.split('\t'));
  const hairStaff=[],beautyStaff=[];
  let summary={},inBeauty=false,hairHeaderFound=false,beautyHeaderFound=false;
  for (let i=0;i<lines.length;i++) {
    const cols=lines[i].map(c=>(c||'').trim());
    const first=cols[0];
    if (!first && cols.every(c=>!c)) continue;
    if (cols.includes('HAIR SALES TAKE') && !inBeauty){hairHeaderFound=true;continue;}
    if (cols.includes('BEAUTY SALES TAKE')){inBeauty=true;beautyHeaderFound=true;continue;}
    if (first==='TOTAL CLIENTS'){summary.totalClients=parseInt(cols[1])||0;continue;}
    if (first==='HAIR RETAIL SALES'){summary.hairRetail=parseAED(cols[1]);summary.hairRetailPct=parseFloat(cols[2])||0;continue;}
    if (first==='TREATMENT SALES'){summary.treatmentSales=parseAED(cols[1]);summary.treatmentPct=parseFloat(cols[2])||0;continue;}
    if (first==='COL TAKE AED'){summary.colTake=parseAED(cols[1]);summary.colPct=parseFloat(cols[2])||0;continue;}
    if (first==='BEAUTY SALES'){summary.beautySales=parseAED(cols[1]);summary.beautyPct=parseFloat(cols[2])||0;continue;}
    if (first==='NET SALON TAKE'){summary.netTake=parseAED(cols[1]);summary.avgBill=parseFloat(cols[2])||0;continue;}
    if (!inBeauty && hairHeaderFound && first && first!=='STAFF' && first!=='TOTALS'){const s=parseHairRow(cols);if(s&&s.total>0)hairStaff.push(s);}
    if (inBeauty && beautyHeaderFound && first && first!=='STAFF' && first!=='TOTALS'){const s=parseBeautyRow(cols);if(s&&s.total>0)beautyStaff.push(s);}
    if (!inBeauty && first==='TOTALS'){summary.totals=parseHairRow(cols);}
  }
  return {hairStaff,beautyStaff,summary};
}

// UPLOAD
async function uploadData() {
  const branch = document.getElementById('branchSelect').value;
  const weekLabel = document.getElementById('weekLabel').value.trim();
  const btn = document.getElementById('uploadBtn');
  const statusEl = document.getElementById('statusMsg');
  if (!weekLabel){alert('Please enter a week label.');return;}
  if (!selectedFile){alert('Please select a TSV file.');return;}
  btn.disabled=true;btn.textContent='Uploading...';statusEl.className='status';
  const text = await selectedFile.text();
  const data = parseTSV(text);
  const {error} = await sb.from('weekly_data').insert({branch,week_label:weekLabel,data});
  if (error){
    statusEl.className='status error';statusEl.textContent='Upload failed: '+error.message;
  } else {
    statusEl.className='status success';statusEl.textContent='Uploaded successfully!';
    document.getElementById('weekLabel').value='';
    selectedFile=null;document.getElementById('fileName').textContent='';
    loadWeeks();
  }
  btn.disabled=false;btn.textContent='Upload to Dashboard';
}

// LOAD WEEKS
async function loadWeeks() {
  const {data,error} = await sb.from('weekly_data').select('id,branch,week_label,uploaded_at').order('uploaded_at',{ascending:false});
  const el = document.getElementById('weeksItems');
  if (error||!data||!data.length){
    el.innerHTML='<p style="font-size:13px;color:var(--muted)">No data uploaded yet.</p>';return;
  }
  el.innerHTML = data.map(w=>`
    <div class="week-item" id="item_${w.id}">
      <div class="week-item-left" id="view_${w.id}">
        <span class="week-label-text">${w.week_label}</span>
        <span class="week-branch-tag">${w.branch} &nbsp;·&nbsp; ${new Date(w.uploaded_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</span>
      </div>
      <div class="week-item-left" id="edit_${w.id}" style="display:none;flex:1;margin-right:8px">
        <input class="edit-input" id="editInput_${w.id}" value="${w.week_label}" onkeydown="if(event.key==='Enter')saveLabel('${w.id}')">
      </div>
      <div class="week-item-right">
        <button class="icon-btn edit" id="editBtn_${w.id}" onclick="startEdit('${w.id}','${w.week_label.replace(/'/g,"\\'")}')">✏️</button>
        <button class="icon-btn save" id="saveBtn_${w.id}" onclick="saveLabel('${w.id}')" style="display:none">✅</button>
        <button class="icon-btn" id="cancelBtn_${w.id}" onclick="cancelEdit('${w.id}')" style="display:none;color:var(--muted)">✕</button>
        <button class="icon-btn del" onclick="deleteWeek('${w.id}')">✕</button>
      </div>
    </div>
  `).join('');
}

// EDIT LABEL
function startEdit(id, currentLabel) {
  document.getElementById('view_'+id).style.display='none';
  document.getElementById('edit_'+id).style.display='flex';
  document.getElementById('editBtn_'+id).style.display='none';
  document.getElementById('saveBtn_'+id).style.display='inline';
  document.getElementById('cancelBtn_'+id).style.display='inline';
  const inp = document.getElementById('editInput_'+id);
  inp.value = currentLabel;
  inp.focus();
}

function cancelEdit(id) {
  document.getElementById('view_'+id).style.display='flex';
  document.getElementById('edit_'+id).style.display='none';
  document.getElementById('editBtn_'+id).style.display='inline';
  document.getElementById('saveBtn_'+id).style.display='none';
  document.getElementById('cancelBtn_'+id).style.display='none';
}

async function saveLabel(id) {
  const newLabel = document.getElementById('editInput_'+id).value.trim();
  if (!newLabel) return;
  const {error} = await sb.from('weekly_data').update({week_label:newLabel}).eq('id',id);
  if (!error) loadWeeks();
  else alert('Error saving: '+error.message);
}

// DELETE
async function deleteWeek(id) {
  if (!confirm('Delete this week\'s data? This cannot be undone.')) return;
  await sb.from('weekly_data').delete().eq('id',id);
  loadWeeks();
}
</script>
</body>
</html>
