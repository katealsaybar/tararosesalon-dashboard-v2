<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tara Rose Ladies Salon — Stylist View</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
[data-theme="light"]{
  --bg:#F9E8DF;--surface:#fff;--surface2:#fdf8f6;
  --border:#e8d5cc;--border2:#f0e8e4;
  --text:#5C5557;--muted:#9a8a87;--muted2:#a09898;
  --accent:#5C5557;--accent-fg:#F9E8DF;
  --shadow:0 2px 12px rgba(92,85,87,0.08);
  --good:#0F6E56;--good-bg:#E1F5EE;
  --warn:#BA7517;--warn-bg:#FAEEDA;
  --bad:#A32D2D;--bad-bg:#FCEBEB;
  --logo-color:#5C5557;--toggle-knob:#5C5557;
  --btn:#5C5557;--btn-fg:#F9E8DF;
  --col-header:#fdf8f6;
}
[data-theme="dark"]{
  --bg:#2D2E37;--surface:#383944;--surface2:#3f4052;
  --border:rgba(250,248,243,0.09);--border2:rgba(250,248,243,0.05);
  --text:#FAF8F3;--muted:rgba(250,248,243,0.55);--muted2:rgba(250,248,243,0.38);
  --accent:#FFD4D9;--accent-fg:#2D2E37;
  --shadow:0 2px 16px rgba(0,0,0,0.28);
  --good:#99F6E4;--good-bg:rgba(153,246,228,0.12);
  --warn:#EEF3C7;--warn-bg:rgba(238,243,199,0.12);
  --bad:#FF9B9B;--bad-bg:rgba(255,155,155,0.12);
  --logo-color:#FAF8F3;--toggle-knob:#FFD4D9;
  --btn:#FFD4D9;--btn-fg:#2D2E37;
  --col-header:#3f4052;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}

/* ── HEADER ── */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);min-height:54px;overflow:hidden}
.logo{display:flex;align-items:center;gap:10px;min-width:0;flex-shrink:1;overflow:hidden}
.logo-text .logo-name{font-family:'DM Sans',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text);line-height:1;white-space:nowrap}
.logo-text .logo-sub{font-size:9px;letter-spacing:0.26em;text-transform:uppercase;color:var(--muted);margin-top:2px;white-space:nowrap}
.logo-strip{height:2px;width:90px;margin-top:4px;background:linear-gradient(to right,#99F6E4,#EEF3C7,#C4B5FD,#FF9B9B,#FFD4D9);border-radius:2px}
.dash-label{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-top:3px;white-space:nowrap}
.header-right{display:flex;align-items:center;gap:10px;flex-shrink:0;margin-left:auto;padding-left:12px}
.toggle-wrap{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
.toggle-lbl{font-size:11px;color:var(--muted);min-width:28px;white-space:nowrap}
.toggle-track{width:38px;height:20px;border-radius:10px;background:var(--border);position:relative;transition:background .3s;border:1px solid var(--border)}
.toggle-thumb{width:14px;height:14px;border-radius:50%;background:var(--toggle-knob);position:absolute;top:2px;left:2px;transition:transform .25s ease,background .3s}
[data-theme="dark"] .toggle-thumb{transform:translateX(18px)}
@media(max-width:700px){.dash-label,.logo-strip{display:none}}

/* ── LAYOUT ── */
.layout{display:flex;height:calc(100vh - 54px);overflow:hidden}
aside.sidebar{width:200px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:16px 12px;display:flex;flex-direction:column;gap:4px;overflow-y:auto;height:100%}
.main-content{flex:1;overflow-y:auto;overflow-x:hidden;height:100%;padding:20px 24px}
@media(max-width:900px){
  .layout{flex-direction:column;height:auto;overflow:visible}
  aside.sidebar{width:100%!important;max-width:none!important;border-right:none!important;border-bottom:1px solid var(--border);flex-direction:row;flex-wrap:wrap;align-items:center;gap:6px;padding:10px 16px;height:auto;overflow-y:visible}
  aside.sidebar > div{display:none}
  .main-content{height:auto;overflow:visible;padding:16px}
}
.nav-group{margin-bottom:20px}
.nav-title{font-size:11px;letter-spacing:1px;color:var(--muted);margin-bottom:8px;text-transform:uppercase}
.nav-sub{font-size:13px;padding:8px 10px;border-radius:6px;cursor:pointer;color:var(--muted);transition:.2s;display:block;width:100%;text-align:left;background:none;border:none;font-family:inherit}
.nav-sub:hover{background:var(--surface2);color:var(--text)}
.nav-sub.active{background:var(--accent);color:var(--accent-fg);font-weight:600}

/* ── CONTROLS ── */
.controls{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 0 10px 0;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:20px}
.ctrl-group{display:flex;flex-direction:column;gap:4px}
.ctrl-label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)}
input[type=text],select{padding:7px 12px;border:1px solid var(--border);border-radius:18px;font-size:12px;color:var(--text);background:var(--surface);font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;min-width:180px}
input[type=text]:focus,select:focus{border-color:var(--accent)}
select{cursor:pointer;min-width:140px}

/* ── LOADING / EMPTY ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:12px;color:var(--muted)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}

/* ── STYLIST GRID ── */
.section-title{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.stylist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:28px}
.stylist-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stylist-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(92,85,87,0.13);border-color:var(--accent)}
.stylist-card.selected{border-color:var(--accent);background:var(--surface2)}
.stylist-card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.stylist-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;color:#fff}
.stylist-card-name{font-weight:700;font-size:13px;letter-spacing:0.04em;text-transform:uppercase}
.stylist-card-type{font-size:10px;color:var(--muted);margin-top:1px}
.stylist-card-stat{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;color:var(--muted);margin-bottom:3px}
.stylist-card-val{font-size:13px;font-weight:700;color:var(--text)}
.stylist-weeks-pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.week-pill{font-size:9px;padding:2px 7px;border-radius:10px;background:var(--surface2);color:var(--muted);border:1px solid var(--border2)}
.week-pill.active{background:var(--good-bg);color:var(--good);border-color:var(--good)}

/* ── DETAIL PANEL ── */
.detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:var(--shadow);margin-bottom:24px}
.detail-header{display:flex;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.detail-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;flex-shrink:0;color:#fff}
.detail-name{font-weight:700;font-size:22px;letter-spacing:0.06em;text-transform:uppercase}
.detail-sub{font-size:11px;color:var(--muted);margin-top:2px}
.detail-close{margin-left:auto;padding:6px 14px;border:1px solid var(--border);border-radius:10px;background:none;color:var(--muted);font-size:11px;cursor:pointer;font-family:inherit;transition:all .2s}
.detail-close:hover{border-color:var(--bad);color:var(--bad)}

/* ── METRICS ROW ── */
.metrics-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.metric-box{background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:12px 14px}
.metric-box-label{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.metric-box-value{font-size:20px;font-weight:700;color:var(--text);line-height:1}
.metric-box-sub{font-size:10px;color:var(--muted);margin-top:2px}
.metric-box.good{background:var(--good-bg);border-color:var(--good)}
.metric-box.good .metric-box-value{color:var(--good)}
.metric-box.warn{background:var(--warn-bg);border-color:var(--warn)}
.metric-box.warn .metric-box-value{color:var(--warn)}
.metric-box.bad{background:var(--bad-bg);border-color:var(--bad)}
.metric-box.bad .metric-box-value{color:var(--bad)}

/* ── WEEKLY TABLE ── */
.weekly-table-wrap{overflow-x:auto;margin-top:16px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);padding:8px 10px;text-align:right;border-bottom:1px solid var(--border);background:var(--col-header);white-space:nowrap}
th:first-child{text-align:left}
td{padding:9px 10px;text-align:right;border-bottom:1px solid var(--border2);color:var(--text);font-size:12px}
td:first-child{text-align:left;font-weight:600;font-size:11px;color:var(--muted)}
tr:hover td{background:var(--surface2)}
tr.total-row td{font-weight:700;background:var(--surface2);border-top:2px solid var(--border);font-size:13px;color:var(--text)}
tr.total-row td:first-child{color:var(--text)}
td.zero{color:var(--muted2)}
td.good{color:var(--good);font-weight:600}
td.warn{color:var(--warn);font-weight:600}
td.bad{color:var(--bad);font-weight:600}

/* ── CHART ── */
.chart-wrap{margin-top:20px;background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:16px}
.chart-title{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
canvas{max-height:220px}

/* ── TABS ── */
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tab-btn{padding:6px 14px;border-radius:18px;border:1px solid var(--border);background:var(--surface2);font-size:11px;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .2s}
.tab-btn:hover{border-color:var(--accent);color:var(--text)}
.tab-btn.active{background:var(--accent);color:var(--accent-fg);border-color:var(--accent);font-weight:700}

/* ── SORT BADGE ── */
.sort-wrap{display:flex;align-items:center;gap:6px}
.sort-btn{padding:5px 12px;border-radius:14px;border:1px solid var(--border);background:var(--surface);font-size:10px;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
.sort-btn:hover,.sort-btn.active{border-color:var(--accent);color:var(--accent);background:var(--surface2)}
</style>
</head>
<body>

<header>
  <div class="logo">
    <img src="image-asset-removebg-preview.png" style="width:36px;height:36px;object-fit:contain">
    <div class="logo-text">
      <div class="logo-name">Tara Rose Ladies</div>
      <div class="logo-sub">Salon</div>
      <div class="logo-strip"></div>
      <div class="dash-label">Stylist Performance</div>
    </div>
  </div>
  <div class="header-right">
    <div class="toggle-wrap" onclick="toggleTheme()">
      <span class="toggle-lbl" id="themeLbl">Dark</span>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
    </div>
  </div>
</header>

<div class="layout">

  <aside class="sidebar">
    <div class="nav-group">
      <div class="nav-title">NAVIGATION</div>
      <button class="nav-sub" onclick="window.location.href='index.html'">← Dashboard</button>
      <button class="nav-sub" onclick="window.location.href='upload.html'">Upload Data</button>
    </div>
    <div class="nav-group">
      <div class="nav-title">FILTER BY TYPE</div>
      <button class="nav-sub active" id="filterAll" onclick="setTypeFilter('all',this)">All Staff</button>
      <button class="nav-sub" id="filterHair" onclick="setTypeFilter('hair',this)">Hair Stylists</button>
      <button class="nav-sub" id="filterBeauty" onclick="setTypeFilter('beauty',this)">Beauticians</button>
    </div>
    <div class="nav-group">
      <div class="nav-title">SORT BY</div>
      <button class="nav-sub active" id="sortSales" onclick="setSort('hairSalesNet',this)">Net Revenue</button>
      <button class="nav-sub" id="sortClients" onclick="setSort('total',this)">Total Clients</button>
      <button class="nav-sub" id="sortRebook" onclick="setSort('rebookPct',this)">Rebooking %</button>
      <button class="nav-sub" id="sortAvgBill" onclick="setSort('avgBill',this)">Avg Bill</button>
    </div>
  </aside>

  <div class="main-content">

    <!-- CONTROLS -->
    <div class="controls">
      <div class="ctrl-group">
        <div class="ctrl-label">Search Stylist</div>
        <input type="text" id="searchInput" placeholder="Type a name…" oninput="renderGrid()">
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">Week</div>
        <select id="weekFilter" onchange="renderGrid()">
          <option value="all">All Weeks</option>
        </select>
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">Branch</div>
        <select id="branchFilter" onchange="renderGrid()">
          <option value="all">All Branches</option>
        </select>
      </div>
    </div>

    <!-- LOADING -->
    <div class="loading" id="loadingEl">
      <div class="spinner"></div>
      <div>Loading stylist data…</div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="mainContent" style="display:none">

      <!-- DETAIL PANEL (hidden until stylist selected) -->
      <div class="detail-panel" id="detailPanel" style="display:none"></div>

      <!-- HAIR STYLISTS GRID -->
      <div id="hairSection">
        <div class="section-title" id="hairSectionTitle">Hair Stylists</div>
        <div class="stylist-grid" id="hairGrid"></div>
      </div>

      <!-- BEAUTY GRID -->
      <div id="beautySection">
        <div class="section-title" id="beautySectionTitle">Beauticians</div>
        <div class="stylist-grid" id="beautyGrid"></div>
      </div>

      <div class="empty" id="emptyState" style="display:none">No stylists match your filters.</div>
    </div>

  </div>
</div>

<script>
const SUPA_URL = 'https://gvijxenafoowajqktqvd.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2aWp4ZW5hZm9vd2FqcWt0cXZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MTA1OTksImV4cCI6MjA5MTI4NjU5OX0.GL3YXupXOBGfN4FCyelbQWraUw12VJNJu-wUB3zR7Zw';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

const BRANCH_INFO = {
  KCA:{ name:'Khalifa City',  color:'#FFD4D9' },
  SAA:{ name:'Saadiyat',      color:'#C4B5FD' },
  MC: { name:'Motor City',    color:'#99F6E4' },
  AQ: { name:'AQ Ladies',     color:'#FF9B9B' },
  FRT:{ name:'Fratelli',      color:'#EEF3C7' },
};
const BEAUTY_NAMES = new Set(['MIMI','GRACE','SHILA','KIM','KIMBERLY','REDA','CHONA']);
const SKIP_NAMES   = new Set(['STAFF','TOTALS','TYPE','TYPE ','BUSINESS','TARA','ASISSTANTS','ASSISTANTS',
  'HAIR RETAIL SALES','TREATMENT SALES','COL TAKE AED','CBD TAKE AED','BEAUTY SALES','BEAUTY RETAIL SALES',
  'NET SALON TAKE','TOTAL CLIENTS']);

const AVATAR_COLORS = ['#C4B5FD','#99F6E4','#FFD4D9','#FF9B9B','#EEF3C7','#B5EAD7','#FFDAC1','#D4E4FF'];
const fmtAED = n  => 'AED ' + Math.round(n||0).toLocaleString();
const fmtPct = n  => (+(n||0)).toFixed(1) + '%';
const initials = n => n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

// ── STATE ──────────────────────────────────────────────────
let allRows = [];         // raw supabase records
let stylistMap = {};      // name -> { weeks:[], hair/beautyStaff data consolidated }
let typeFilter = 'all';
let sortKey    = 'hairSalesNet';
let selectedStylist = null;
let activeChart = null;

// ── THEME ──────────────────────────────────────────────────
function toggleTheme(){
  const dark = document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('themeLbl').textContent = dark ? 'Dark' : 'Light';
}

// ── FILTER HELPERS ─────────────────────────────────────────
function setTypeFilter(type, el){
  typeFilter = type;
  document.querySelectorAll('#filterAll,#filterHair,#filterBeauty').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}
function setSort(key, el){
  sortKey = key;
  document.querySelectorAll('#sortSales,#sortClients,#sortRebook,#sortAvgBill').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}

// ── LOAD DATA ──────────────────────────────────────────────
async function loadData(){
  const { data, error } = await sb.from('weekly_data').select('*').order('uploaded_at',{ascending:true});
  if(error){ document.getElementById('loadingEl').innerHTML='<div style="color:var(--bad)">Error loading data: '+error.message+'</div>'; return; }
  allRows = data || [];
  buildStylistMap();
  populateFilters();
  document.getElementById('loadingEl').style.display='none';
  document.getElementById('mainContent').style.display='block';
  renderGrid();
}

function isSkip(name){
  const n = name.toUpperCase().trim();
  if(SKIP_NAMES.has(n)) return true;
  if(n.includes('RETAIL') || n.includes('TREATMENT') || n.includes('TAKE') || n.includes('TOTAL') || n.includes('SALES')) return true;
  return false;
}

function buildStylistMap(){
  stylistMap = {};
  for(const row of allRows){
    const { branch, week_label, data: d, uploaded_at } = row;
    if(!d) continue;
    const allStaff = [
      ...(d.hairStaff||[]).map(s=>({...s, isBeauty:false})),
      ...(d.beautyStaff||[]).map(s=>({...s, isBeauty:true})),
    ];
    for(const st of allStaff){
      const name = (st.name||'').trim().toUpperCase();
      if(!name || isSkip(name)) continue;
      // Decide type: explicitly beauty OR in beauty names list
      const isBeauty = st.isBeauty || BEAUTY_NAMES.has(name);
      if(!stylistMap[name]){
        stylistMap[name] = { name, isBeauty, weeks:[], color: AVATAR_COLORS[Object.keys(stylistMap).length % AVATAR_COLORS.length] };
      }
      stylistMap[name].weeks.push({
        week_label: week_label||'—',
        branch: branch||'—',
        uploaded_at,
        total:        st.total||0,
        req:          st.req||0,
        salon:        st.salon||0,
        newC:         st.newC||0,
        rebooked:     st.rebooked||0,
        rebookPct:    st.rebookPct||0,
        hairSalesNet: st.hairSalesNet||0,
        hairSales:    st.hairSales||0,
        beautySales:  st.beautySales||0,
        avgBill:      st.avgBill||0,
        col:          st.col||0,
        colPct:       st.colPct||0,
        retail:       st.retail||0,
        treatments:   st.treatments||0,
        ncrPct:       st.ncrPct||0,
      });
    }
  }
}

function populateFilters(){
  const weeks   = [...new Set(allRows.map(r=>r.week_label).filter(Boolean))].sort();
  const branches= [...new Set(allRows.map(r=>r.branch).filter(Boolean))].sort();

  const wSel = document.getElementById('weekFilter');
  weeks.forEach(w=>{ const o=document.createElement('option'); o.value=w; o.textContent=w; wSel.appendChild(o); });

  const bSel = document.getElementById('branchFilter');
  branches.forEach(b=>{ const o=document.createElement('option'); o.value=b; o.textContent=BRANCH_INFO[b]?.name||b; bSel.appendChild(o); });
}

// ── COMPUTE CONSOLIDATED STATS ─────────────────────────────
function getStats(stylist, weekFilter='all', branchFilter='all'){
  let weeks = stylist.weeks;
  if(weekFilter!=='all')   weeks = weeks.filter(w=>w.week_label===weekFilter);
  if(branchFilter!=='all') weeks = weeks.filter(w=>w.branch===branchFilter);

  if(!weeks.length) return null;
  const sum = (key) => weeks.reduce((a,w)=>a+(w[key]||0),0);
  const avg = (key) => sum(key)/weeks.length;
  const totalClients = sum('total');
  const netRevTotal  = sum('hairSalesNet') + sum('beautySales');

  return {
    weeksActive:   weeks.length,
    total:         sum('total'),
    req:           sum('req'),
    salon:         sum('salon'),
    newC:          sum('newC'),
    rebooked:      sum('rebooked'),
    rebookPct:     totalClients>0 ? sum('rebooked')/totalClients*100 : avg('rebookPct'),
    hairSalesNet:  sum('hairSalesNet'),
    hairSales:     sum('hairSales'),
    beautySales:   sum('beautySales'),
    netRevTotal,
    avgBill:       totalClients>0 ? netRevTotal/totalClients : avg('avgBill'),
    col:           sum('col'),
    colPct:        avg('colPct'),
    retail:        sum('retail'),
    treatments:    sum('treatments'),
    ncrPct:        avg('ncrPct'),
    weeks,
  };
}

// ── RENDER GRID ────────────────────────────────────────────
function renderGrid(){
  const search  = document.getElementById('searchInput').value.trim().toUpperCase();
  const wf      = document.getElementById('weekFilter').value;
  const bf      = document.getElementById('branchFilter').value;

  let stylists = Object.values(stylistMap).filter(s=>{
    if(search && !s.name.includes(search)) return false;
    const stats = getStats(s, wf, bf);
    if(!stats) return false; // no data for this filter combo
    s._stats = stats;
    return true;
  });

  // Type filter
  const hair   = stylists.filter(s=>!s.isBeauty);
  const beauty = stylists.filter(s=>s.isBeauty);

  // Sort
  const doSort = arr => arr.sort((a,b)=>{
    const aVal = sortKey==='hairSalesNet' ? (a._stats.hairSalesNet+a._stats.beautySales) : (a._stats[sortKey]||0);
    const bVal = sortKey==='hairSalesNet' ? (b._stats.hairSalesNet+b._stats.beautySales) : (b._stats[sortKey]||0);
    return bVal - aVal;
  });
  doSort(hair); doSort(beauty);

  const showHair   = typeFilter==='all'||typeFilter==='hair';
  const showBeauty = typeFilter==='all'||typeFilter==='beauty';

  document.getElementById('hairSection').style.display   = showHair   && hair.length   ? 'block' : 'none';
  document.getElementById('beautySection').style.display = showBeauty && beauty.length ? 'block' : 'none';
  document.getElementById('emptyState').style.display    = (!showHair||!hair.length) && (!showBeauty||!beauty.length) ? 'block' : 'none';

  if(showHair)   renderSection(hair,   'hairGrid',   'Hair Stylists',  hair.length,   'hairSectionTitle');
  if(showBeauty) renderSection(beauty, 'beautyGrid', 'Beauticians',    beauty.length, 'beautySectionTitle');

  // Re-render detail if open
  if(selectedStylist && stylistMap[selectedStylist]){
    const s = stylistMap[selectedStylist];
    s._stats = getStats(s, wf, bf);
    if(s._stats) renderDetail(s);
    else { document.getElementById('detailPanel').style.display='none'; selectedStylist=null; }
  }
}

function renderSection(list, gridId, title, count, titleId){
  document.getElementById(titleId).textContent = `${title} · ${count} ${count===1?'person':'people'}`;
  const grid = document.getElementById(gridId);
  const wf   = document.getElementById('weekFilter').value;
  const bf   = document.getElementById('branchFilter').value;

  grid.innerHTML = list.map(s=>{
    const st   = s._stats;
    const rev  = s.isBeauty ? st.beautySales : st.hairSalesNet;
    const revLabel = s.isBeauty ? 'Beauty Sales' : 'Net Hair Rev';

    // Week pills: all weeks this stylist appears in (highlight ones matching filter)
    const allWeeks  = [...new Set(s.weeks.map(w=>w.week_label))].sort();
    const activeWks = new Set(st.weeks.map(w=>w.week_label));
    const pillsHTML = allWeeks.map(w=>`<span class="week-pill ${activeWks.has(w)?'active':''}">${w}</span>`).join('');

    return `<div class="stylist-card ${selectedStylist===s.name?'selected':''}" onclick="selectStylist('${s.name}')">
      <div class="stylist-card-top">
        <div class="stylist-avatar" style="background:${s.color}">${initials(s.name)}</div>
        <div>
          <div class="stylist-card-name">${s.name}</div>
          <div class="stylist-card-type">${s.isBeauty?'Beautician':'Hair Stylist'} · ${st.weeksActive}w</div>
        </div>
      </div>
      <div class="stylist-card-stat"><span>${revLabel}</span><span class="stylist-card-val">${fmtAED(rev)}</span></div>
      <div class="stylist-card-stat"><span>Clients</span><span class="stylist-card-val">${st.total}</span></div>
      <div class="stylist-card-stat"><span>Rebook</span><span class="stylist-card-val">${fmtPct(st.rebookPct)}</span></div>
      <div class="stylist-card-stat"><span>Avg Bill</span><span class="stylist-card-val">${fmtAED(st.avgBill)}</span></div>
      <div class="stylist-weeks-pills">${pillsHTML}</div>
    </div>`;
  }).join('');
}

// ── SELECT + DETAIL ────────────────────────────────────────
function selectStylist(name){
  if(selectedStylist===name){ closeDetail(); return; }
  selectedStylist = name;
  const wf = document.getElementById('weekFilter').value;
  const bf = document.getElementById('branchFilter').value;
  const s  = stylistMap[name];
  s._stats = getStats(s, wf, bf);
  renderDetail(s);
  renderGrid(); // re-highlight card
  document.getElementById('detailPanel').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function closeDetail(){
  selectedStylist = null;
  document.getElementById('detailPanel').style.display='none';
  if(activeChart){ activeChart.destroy(); activeChart=null; }
  renderGrid();
}

function renderDetail(s){
  const st = s._stats;
  const panel = document.getElementById('detailPanel');
  panel.style.display='block';

  const isBeauty = s.isBeauty;
  const rev = isBeauty ? st.beautySales : st.hairSalesNet;

  // Target benchmarks
  const rebookClass = st.rebookPct >= 45 ? 'good' : st.rebookPct >= 30 ? '' : 'bad';
  const ncrClass    = st.ncrPct >= 20 ? 'good' : st.ncrPct >= 10 ? '' : 'bad';
  const avgBillClass= st.avgBill >= 650 ? 'good' : st.avgBill >= 500 ? '' : 'bad';
  const colClass    = !isBeauty && st.colPct >= 60 ? 'good' : !isBeauty && st.colPct >= 40 ? '' : '';

  panel.innerHTML = `
    <div class="detail-header">
      <div class="detail-avatar" style="background:${s.color}">${initials(s.name)}</div>
      <div>
        <div class="detail-name">${s.name}</div>
        <div class="detail-sub">${isBeauty?'Beautician':'Hair Stylist'} · Active ${st.weeksActive} week${st.weeksActive!==1?'s':''} · ${[...new Set(st.weeks.map(w=>BRANCH_INFO[w.branch]?.name||w.branch))].join(', ')}</div>
      </div>
      <button class="detail-close" onclick="closeDetail()">✕ Close</button>
    </div>

    <div class="metrics-row">
      <div class="metric-box">
        <div class="metric-box-label">${isBeauty?'Beauty Sales':'Net Hair Revenue'}</div>
        <div class="metric-box-value">${fmtAED(rev)}</div>
        <div class="metric-box-sub">across ${st.weeksActive} weeks</div>
      </div>
      <div class="metric-box">
        <div class="metric-box-label">Total Clients</div>
        <div class="metric-box-value">${st.total}</div>
        <div class="metric-box-sub">${Math.round(st.total/Math.max(1,st.weeksActive))}/week avg</div>
      </div>
      <div class="metric-box ${avgBillClass}">
        <div class="metric-box-label">Avg Bill</div>
        <div class="metric-box-value">${fmtAED(st.avgBill)}</div>
        <div class="metric-box-sub">Target: AED 650</div>
      </div>
      <div class="metric-box ${rebookClass}">
        <div class="metric-box-label">Rebooking %</div>
        <div class="metric-box-value">${fmtPct(st.rebookPct)}</div>
        <div class="metric-box-sub">Target: 45%</div>
      </div>
      <div class="metric-box ${ncrClass}">
        <div class="metric-box-label">NCR %</div>
        <div class="metric-box-value">${fmtPct(st.ncrPct)}</div>
        <div class="metric-box-sub">Target: 20%</div>
      </div>
      ${!isBeauty ? `
      <div class="metric-box ${colClass}">
        <div class="metric-box-label">Colour %</div>
        <div class="metric-box-value">${fmtPct(st.colPct)}</div>
        <div class="metric-box-sub">Colour clients</div>
      </div>
      <div class="metric-box">
        <div class="metric-box-label">Retail Sales</div>
        <div class="metric-box-value">${fmtAED(st.retail)}</div>
        <div class="metric-box-sub">total</div>
      </div>
      <div class="metric-box">
        <div class="metric-box-label">Treatments</div>
        <div class="metric-box-value">${fmtAED(st.treatments)}</div>
        <div class="metric-box-sub">total</div>
      </div>
      ` : `
      <div class="metric-box">
        <div class="metric-box-label">Rebooked</div>
        <div class="metric-box-value">${st.rebooked}</div>
        <div class="metric-box-sub">clients</div>
      </div>
      `}
    </div>

    <!-- WEEKLY BREAKDOWN TABLE -->
    <div class="chart-title" style="margin-bottom:8px;margin-top:4px">WEEK-BY-WEEK BREAKDOWN</div>
    <div class="weekly-table-wrap">
      ${renderWeekTable(st, isBeauty)}
    </div>

    <!-- TREND CHART -->
    <div class="chart-wrap">
      <div class="chart-title">${isBeauty?'Beauty Sales':'Net Revenue'} + Clients · Weekly Trend</div>
      <canvas id="trendChart"></canvas>
    </div>
  `;

  // Draw chart after DOM is ready
  setTimeout(()=>drawChart(st, isBeauty), 50);
}

function renderWeekTable(st, isBeauty){
  const weeks = [...st.weeks].sort((a,b)=>a.week_label.localeCompare(b.week_label));
  const cols = isBeauty
    ? ['week_label','branch','total','rebooked','rebookPct','beautySales','avgBill']
    : ['week_label','branch','total','rebooked','rebookPct','hairSalesNet','avgBill','col','colPct','retail','treatments'];
  const heads = isBeauty
    ? ['Week','Branch','Clients','Rebooked','Rebook %','Beauty Sales','Avg Bill']
    : ['Week','Branch','Clients','Rebooked','Rebook %','Net Revenue','Avg Bill','Colour','Col %','Retail','Treatment'];

  // Totals row
  const totals = {};
  for(const c of cols){
    if(c==='week_label') totals[c]='TOTAL';
    else if(c==='branch') totals[c]='';
    else if(c==='rebookPct') totals[c] = st.total>0 ? st.rebooked/st.total*100 : 0;
    else if(c==='colPct') totals[c] = weeks.length>0 ? weeks.reduce((a,w)=>a+(w.colPct||0),0)/weeks.length : 0;
    else if(c==='avgBill') totals[c] = st.total>0 ? (st.hairSalesNet+st.beautySales)/st.total : 0;
    else totals[c] = weeks.reduce((a,w)=>a+(w[c]||0),0);
  }

  const fmtCell = (col, val, isTotal=false) => {
    if(col==='week_label'||col==='branch') return val || '—';
    if(col==='rebookPct'||col==='colPct') return fmtPct(val);
    return fmtAED(val);
  };
  const cellClass = (col, val) => {
    if(col==='rebookPct') return val>=45?'good':val>=30?'':'bad';
    if(col==='colPct')    return val>=60?'good':val>=40?'':'';
    if(col==='avgBill')   return val>=650?'good':val>=500?'':'bad';
    return val===0?'zero':'';
  };

  const bodyRows = weeks.map(w=>`
    <tr>
      ${cols.map(c=>`<td class="${cellClass(c,w[c]||0)}">${fmtCell(c,w[c])}</td>`).join('')}
    </tr>
  `).join('');

  const totalRow = `<tr class="total-row">${cols.map(c=>`<td class="${c==='week_label'?'':''}${cellClass(c,totals[c])}">${fmtCell(c,totals[c],true)}</td>`).join('')}</tr>`;

  return `<table>
    <thead><tr>${heads.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${bodyRows}${totalRow}</tbody>
  </table>`;
}

function drawChart(st, isBeauty){
  const canvas = document.getElementById('trendChart');
  if(!canvas) return;
  if(activeChart){ activeChart.destroy(); activeChart=null; }

  const weeks  = [...st.weeks].sort((a,b)=>a.week_label.localeCompare(b.week_label));
  const labels = weeks.map(w=>w.week_label);
  const revData = weeks.map(w=>isBeauty ? w.beautySales : w.hairSalesNet);
  const clData  = weeks.map(w=>w.total);

  const isDark = document.documentElement.getAttribute('data-theme')==='dark';
  const textColor = isDark ? 'rgba(250,248,243,0.55)' : '#9a8a87';
  const gridColor = isDark ? 'rgba(250,248,243,0.06)' : 'rgba(92,85,87,0.08)';

  activeChart = new Chart(canvas, {
    data:{
      labels,
      datasets:[
        { type:'bar', label: isBeauty?'Beauty Sales':'Net Revenue', data:revData,
          backgroundColor: 'rgba(196,181,253,0.5)', borderColor:'#C4B5FD', borderWidth:1, borderRadius:6, yAxisID:'y' },
        { type:'line', label:'Clients', data:clData,
          borderColor:'#FF9B9B', backgroundColor:'transparent', pointBackgroundColor:'#FF9B9B',
          pointRadius:4, tension:0.3, borderWidth:2, yAxisID:'y2' },
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:true,
      plugins:{ legend:{ labels:{ color:textColor, font:{size:11}, boxWidth:12 } } },
      scales:{
        x:{ ticks:{ color:textColor, font:{size:10} }, grid:{ color:gridColor } },
        y:{ ticks:{ color:textColor, font:{size:10}, callback:v=>'AED '+Math.round(v/1000)+'k' }, grid:{ color:gridColor }, position:'left' },
        y2:{ ticks:{ color:textColor, font:{size:10} }, grid:{ display:false }, position:'right' },
      }
    }
  });
}

// ── INIT ───────────────────────────────────────────────────
loadData();
</script>
