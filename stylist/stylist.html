<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tara Rose Ladies Salon — Stylist View</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="stylist.css">

</head>
<body>

<header>
  <div class="logo">
    <img src="image-asset-removebg-preview.png" style="width:36px;height:36px;object-fit:contain">
    <div class="logo-text">
      <div class="logo-name">Tara Rose Ladies</div>
      <div class="logo-sub">Salon</div>
      <div class="logo-strip"></div>
      <div class="dash-label">Stylist Performance</div>
    </div>
  </div>
  <div class="header-right">
    <div class="toggle-wrap" onclick="toggleTheme()">
      <span class="toggle-lbl" id="themeLbl">Light</span>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
    </div>
  </div>
</header>

<div class="layout">

  <aside class="sidebar">
    <div class="nav-group">
      <div class="nav-title">NAVIGATION</div>
      <button class="nav-sub" onclick="window.location.href='index.html'">← Dashboard</button>
      <button class="nav-sub" onclick="window.location.href='upload.html'">Upload Data</button>
    </div>
    <div class="nav-group">
      <div class="nav-title">FILTER BY TYPE</div>
      <button class="nav-sub active" id="filterAll" onclick="setTypeFilter('all',this)">All Staff</button>
      <button class="nav-sub" id="filterHair" onclick="setTypeFilter('hair',this)">Hair Stylists</button>
      <button class="nav-sub" id="filterBeauty" onclick="setTypeFilter('beauty',this)">Beauticians</button>
    </div>
    <div class="nav-group">
      <div class="nav-title">SORT BY</div>
      <button class="nav-sub active" id="sortSales" onclick="setSort('hairSalesNet',this)">Net Revenue</button>
      <button class="nav-sub" id="sortClients" onclick="setSort('total',this)">Total Clients</button>
      <button class="nav-sub" id="sortRebook" onclick="setSort('rebookPct',this)">Rebooking %</button>
      <button class="nav-sub" id="sortAvgBill" onclick="setSort('avgBill',this)">Avg Bill</button>
    </div>
  </aside>

  <div class="main-content">

    <!-- CONTROLS -->
    <div class="controls">

      <div class="ctrl-group">
        <div class="ctrl-label">Staff</div>
        <input type="text" id="searchInput" placeholder="Type a name...">
      </div>

      <div class="ctrl-group">
        <div class="ctrl-label">Branch</div>
        <select id="branchFilter" onchange="renderGrid()">
          <option value="all">All Branches</option>
          <option value="KCA">Khalifa City</option>
          <option value="SAA">Saadiyat</option>
          <option value="MC">Motor City</option>
          <option value="AQ">AQ Ladies</option>
          <option value="FRT">Fratelli</option>
        </select>
      </div>
    
      <div class="ctrl-group" id="dateRangeWrap">
        <div class="ctrl-label">Date Range</div>
        <div style="position:relative">
          <button id="datePickerBtn" onclick="event.stopPropagation(); toggleDatePicker()" style="
            padding:7px 14px;border:1px solid var(--border);border-radius:18px;
            font-size:12px;color:var(--text);background:var(--surface);
            font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;
            display:flex;align-items:center;gap:8px;min-width:220px;justify-content:space-between;
          ">
            <span id="datePickerLabel">Select Date/s From and To</span>
            <span style="font-size:10px;opacity:.5">▾</span>
          </button>
          <div id="datePickerDropdown" onclick="event.stopPropagation()" style="display:none;position:absolute;
            background:var(--surface);border:1px solid var(--border);border-radius:14px;
            box-shadow:0 8px 32px rgba(0,0,0,0.15);padding:16px;min-width:300px;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
              <button onclick="calNav(-1)" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:4px 8px">‹</button>
              <span id="calMonthLabel" style="font-size:13px;font-weight:600;color:var(--text)"></span>
              <button onclick="calNav(1)" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:4px 8px">›</button>
            </div>
            <div id="calGrid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:12px"></div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:12px;color:var(--muted)">
              <div style="flex:1;text-align:center">
                <div style="font-size:9px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">FROM</div>
                <div id="calFromDisplay" style="padding:6px;border:1px solid var(--border);border-radius:8px;color:var(--text);min-height:28px">Select start</div>
              </div>
              <span style="font-size:16px;opacity:.4">→</span>
              <div style="flex:1;text-align:center">
                <div style="font-size:9px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">TO</div>
                <div id="calToDisplay" style="padding:6px;border:1px solid var(--border);border-radius:8px;color:var(--text);min-height:28px">Select end</div>
              </div>
              <button onclick="clearDateRange()" style="padding:4px 10px;border:1px solid var(--border);border-radius:8px;background:none;color:var(--muted);font-size:11px;cursor:pointer">Clear</button>
            </div>
            <button onclick="applyDatePicker()" style="
              width:100%;padding:8px;background:var(--accent);color:var(--accent-fg);
              border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif
            ">APPLY</button>
          </div>
        </div>
      </div>
      
      <!-- hidden inputs still used internally -->
      <input type="date" id="dateFromInput" style="display:none">
      <input type="date" id="dateToInput" style="display:none">
    
    </div>

    <!-- LOADING -->
    <div class="loading" id="loadingEl">
      <div class="spinner"></div>
      <div>Loading stylist data…</div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="mainContent" style="display:none">

      <!-- DETAIL PANEL (hidden until stylist selected) -->
      <div class="detail-panel" id="detailPanel" style="display:none"></div>

      <!-- HAIR STYLISTS GRID -->
      <div id="hairSection">
        <div class="section-title" id="hairSectionTitle">Hair Stylists</div>
        <div class="stylist-grid" id="hairGrid"></div>
      </div>

      <!-- BEAUTY GRID -->
      <div id="beautySection">
        <div class="section-title" id="beautySectionTitle">Beauticians</div>
        <div class="stylist-grid" id="beautyGrid"></div>
      </div>

      <div class="empty" id="emptyState" style="display:none">
        No results. Try adjusting date range or search.
      </div>
    </div>

  </div>
</div>

<script src="stylist.js" defer></script>
</body>
</html>
