<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tara Rose Salon — Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
[data-theme="light"]{
  --bg:#F9E8DF;--surface:#fff;--surface2:#fdf8f6;--border:#e8d5cc;--border2:#f0e8e4;
  --text:#5C5557;--muted:#9a8a87;--muted2:#a09898;--accent:#5C5557;--accent-fg:#F9E8DF;
  --shadow:0 2px 12px rgba(92,85,87,0.08);
  --good:#0F6E56;--good-bg:#E1F5EE;--warn:#BA7517;--warn-bg:#FAEEDA;--bad:#A32D2D;--bad-bg:#FCEBEB;
  --logo-color:#5C5557;--toggle-knob:#5C5557;
}
[data-theme="dark"]{
  --bg:#2D2E37;--surface:#383944;--surface2:#3f4052;--border:rgba(250,248,243,0.09);--border2:rgba(250,248,243,0.05);
  --text:#FAF8F3;--muted:rgba(250,248,243,0.55);--muted2:rgba(250,248,243,0.38);--accent:#FFD4D9;--accent-fg:#2D2E37;
  --shadow:0 2px 16px rgba(0,0,0,0.28);
  --good:#99F6E4;--good-bg:rgba(153,246,228,0.12);--warn:#EEF3C7;--warn-bg:rgba(238,243,199,0.12);--bad:#FF9B9B;--bad-bg:rgba(255,155,155,0.12);
  --logo-color:#FAF8F3;--toggle-knob:#FFD4D9;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);transition:background .3s,border-color .3s}
.logo{display:flex;align-items:center;gap:12px}
.logo img{width:36px;height:36px;object-fit:contain}
.logo-text .logo-name{font-family:'DM Sans',sans-serif;font-weight:700;font-size:17px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text);line-height:1}
.logo-text .logo-sub{font-size:9px;letter-spacing:0.26em;text-transform:uppercase;color:var(--muted);margin-top:2px}
.logo-strip{height:2px;width:110px;margin-top:5px;background:linear-gradient(to right,#99F6E4,#EEF3C7,#C4B5FD,#FF9B9B,#FFD4D9);border-radius:2px}
.dash-label{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-top:4px}
.header-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.last-updated{font-size:11px;color:var(--muted);white-space:nowrap}
.toggle-wrap{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
.toggle-lbl{font-size:11px;color:var(--muted);min-width:28px}
.toggle-track{width:38px;height:20px;border-radius:10px;background:var(--border);position:relative;transition:background .3s;flex-shrink:0;border:1px solid var(--border)}
.toggle-thumb{width:14px;height:14px;border-radius:50%;background:var(--toggle-knob);position:absolute;top:2px;left:2px;transition:transform .25s ease,background .3s}
[data-theme="dark"] .toggle-thumb{transform:translateX(18px)}

/* CONTROLS */
.controls{display:flex;flex-wrap:wrap;gap:10px;padding:18px 28px 0;align-items:flex-end}
.ctrl-group{display:flex;flex-direction:column;gap:4px}
.ctrl-label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)}
.ms-wrap{position:relative}
.ms-btn{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 12px;border:1px solid var(--border);border-radius:18px;font-size:12px;color:var(--text);background:var(--surface);font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;min-width:140px;transition:all .2s}
.ms-btn:hover,.ms-btn.open{border-color:var(--accent)}
.ms-btn svg{flex-shrink:0;opacity:.5;transition:transform .2s}
.ms-btn.open svg{transform:rotate(180deg)}
.ms-drop{position:absolute;top:calc(100% + 5px);left:0;z-index:200;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);min-width:100%;max-height:260px;overflow-y:auto;display:none}
.ms-drop.open{display:block}
.ms-opt{display:flex;align-items:center;gap:9px;padding:8px 13px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s;user-select:none;border-left:3px solid transparent}
.ms-opt:hover{background:var(--surface2);color:var(--text)}
.ms-opt.selected{color:var(--accent);background:var(--surface2);border-left-color:var(--accent);font-weight:600}
.ms-opt.all-opt{font-weight:600;border-bottom:1px solid var(--border);border-left:3px solid transparent}
.ms-opt.all-opt.selected{color:var(--accent);background:var(--surface2);border-left-color:var(--accent)}

/* MAIN */
main{max-width:1400px;margin:0 auto;padding:22px 28px 48px}
.section-label{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}

/* METRICS */
.metric{background:var(--surface);border-radius:13px;padding:18px 16px;border:1px solid var(--border);box-shadow:var(--shadow);position:relative;overflow:hidden;transition:background .3s,border-color .3s}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:13px 13px 0 0}
.m-rose::before{background:#FFD4D9}.m-coral::before{background:#FF9B9B}.m-lav::before{background:#C4B5FD}.m-turq::before{background:#99F6E4}
.m-lime::before{background:#EEF3C7}.m-pink::before{background:#FFB6C1}.m-sage::before{background:#B5EAD7}.m-peach::before{background:#FFDAC1}
.metric-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.metric-value{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:28px;line-height:1;color:var(--text);transition:color .3s}
.metric-value.good{color:var(--good)}.metric-value.warn{color:var(--warn)}.metric-value.bad{color:var(--bad)}
.metric-target{font-size:11px;color:var(--muted2);margin-top:8px;letter-spacing:0.04em;display:flex;align-items:center;gap:4px}
.metric-target::before{content:'';display:inline-block;width:3px;height:3px;border-radius:50%;background:var(--muted2);flex-shrink:0}

/* CARDS */
.card{background:var(--surface);border-radius:13px;padding:22px;border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:12px;transition:background .3s,border-color .3s}
.card-title{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:16px;color:var(--text);margin-bottom:3px}
.card-sub{font-size:11px;color:var(--muted);margin-bottom:14px}

/* DONUT */
.donut-inner{display:flex;align-items:center;gap:20px}
.donut-wrap{position:relative;width:110px;height:110px;flex-shrink:0}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.donut-center-val{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--text);line-height:1}
.donut-center-lbl{font-size:8px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:2px}
.legend{display:flex;flex-direction:column;gap:6px;flex:1}
.legend-item{display:flex;align-items:center;justify-content:space-between;font-size:11px}
.legend-l{display:flex;align-items:center;gap:6px}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.legend-name{color:var(--muted)}
.legend-r{display:flex;gap:6px}
.legend-n{color:var(--text);font-weight:500}
.legend-p{color:var(--muted2)}

/* REBOOK BARS */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-stylist{display:flex;align-items:center;gap:6px;min-width:95px}
.stylist-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#2D2E37;flex-shrink:0}
.bar-name{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:65px}
.bar-clients{font-size:11px;color:var(--muted);min-width:20px;text-align:center}
.bar-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:visible;position:relative}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.bar-pct{font-size:11px;font-weight:500;color:var(--text);min-width:34px;text-align:right}
.target-line{font-size:10px;color:var(--muted2);margin-top:6px}

/* TABS */
.tabs{display:flex;margin-bottom:16px;border-bottom:1px solid var(--border)}
.tab{padding:7px 16px;font-size:11px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);margin-bottom:-1px;letter-spacing:0.1em;text-transform:uppercase;font-family:'DM Sans',sans-serif;background:none;border-top:none;border-left:none;border-right:none;transition:color .2s}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 9px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;font-family:'DM Sans',sans-serif}
td{padding:8px 9px;border-bottom:1px solid var(--border2);color:var(--text)}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:500}
.badge.good{background:var(--good-bg);color:var(--good)}.badge.warn{background:var(--warn-bg);color:var(--warn)}.badge.bad{background:var(--bad-bg);color:var(--bad)}
th.sortable{cursor:pointer;user-select:none}
th.sortable:hover{color:var(--text)}
th.sort-asc::after{content:' ▲';font-size:9px;opacity:0.7}
th.sort-desc::after{content:' ▼';font-size:9px;opacity:0.7}
th:not(.sort-asc):not(.sort-desc).sortable::after{content:' ⇅';font-size:9px;opacity:0.3}

/* F-PILLS */
.f-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.f-pill{padding:4px 12px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all .2s}
.f-pill:hover{border-color:var(--accent);color:var(--accent)}
.f-pill.active{background:var(--accent);border-color:var(--accent);color:var(--accent-fg);font-weight:700}
.canvas-wrap{position:relative;height:230px}

/* TOP 3 */
.top3-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.top3-grid-row2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px;max-width:66%;margin-left:auto;margin-right:auto}
.top3-col{background:var(--surface);border-radius:13px;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden}
.top3-col-hdr{padding:12px 14px;border-bottom:1px solid var(--border)}
.top3-col-name{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text)}
.top3-accent{height:2px;border-radius:2px;margin-top:6px}
.top3-col-body{padding:10px 12px}
.top3-metric-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.top3-tab{padding:3px 9px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.top3-tab:hover{border-color:var(--accent);color:var(--accent)}
.top3-tab.active{background:var(--accent);border-color:var(--accent);color:var(--accent-fg);font-weight:700}
.top3-subtabs{display:flex;margin-bottom:10px;border-bottom:1px solid var(--border)}
.top3-subtab{padding:5px 10px;font-size:10px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);margin-bottom:-1px;text-transform:uppercase;font-family:'DM Sans',sans-serif;background:none;border-top:none;border-left:none;border-right:none;letter-spacing:0.06em;transition:color .2s}
.top3-subtab.active{color:var(--text);border-bottom-color:var(--accent)}
.top3-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border2)}
.top3-item:last-child{border-bottom:none}
.top3-rank{font-size:16px;font-family:'Cormorant Garamond',serif;font-weight:600;color:var(--muted2);min-width:16px;text-align:center}
.top3-rank.gold{color:#F5C842}.top3-rank.silver{color:#B0B8C1}.top3-rank.bronze{color:#CD7F32}
.top3-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#2D2E37;flex-shrink:0}
.top3-info{flex:1;min-width:0}
.top3-name{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top3-val{font-size:10px;color:var(--muted);margin-top:1px}
.top3-empty{font-size:11px;color:var(--muted2);text-align:center;padding:16px 0}

.empty{text-align:center;padding:4rem;color:var(--muted);font-size:14px}
.loading{text-align:center;padding:4rem;color:var(--muted);letter-spacing:0.1em;font-size:12px;text-transform:uppercase}
footer{text-align:center;padding:18px 28px;border-top:1px solid var(--border);font-size:11px;color:var(--muted2);transition:border-color .3s;line-height:1.8}

@media(max-width:1100px){.top3-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){header{padding:12px 18px}.controls{padding:14px 18px 0}main{padding:18px 18px 40px}.last-updated{display:none}}
@media(max-width:560px){.top3-grid{grid-template-columns:1fr 1fr}.ms-btn{min-width:2000px;font-size:11px}}
</style>
</head>
<body>
<header>
  <div class="logo">
    <img src="image-asset-removebg-preview.png" style="width:36px;height:36px;object-fit:contain">
    <div class="logo-text">
      <div class="logo-name">Tara Rose</div>
      <div class="logo-sub">Salon</div>
      <div class="logo-strip"></div>
      <div class="dash-label">Dashboard Overview</div>
    </div>
  </div>
  <div class="header-right">
    <div class="last-updated" id="lastUpdated"></div>
    <div class="toggle-wrap" onclick="toggleTheme()">
      <span class="toggle-lbl" id="themeLbl">Dark</span>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
    </div>
  </div>
</header>

<div class="controls" id="controls">
  <div class="ctrl-group">
    <span class="ctrl-label">Branch</span>
    <div class="ms-wrap" id="wrap-branch">
      <div class="ms-btn" id="btn-branch" onclick="toggleDrop('branch')">
        <span id="lbl-branch">All branches</span>
        <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <div class="ms-drop" id="drop-branch"></div>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Year</span>
    <div class="ms-wrap" id="wrap-year">
      <div class="ms-btn" id="btn-year" onclick="toggleDrop('year')">
        <span id="lbl-year">All years</span>
        <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <div class="ms-drop" id="drop-year"></div>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Month</span>
    <div class="ms-wrap" id="wrap-month">
      <div class="ms-btn" id="btn-month" onclick="toggleDrop('month')">
        <span id="lbl-month">All months</span>
        <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <div class="ms-drop" id="drop-month"></div>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Week</span>
    <div class="ms-wrap" id="wrap-week">
      <div class="ms-btn" id="btn-week" onclick="toggleDrop('week')">
        <span id="lbl-week">All weeks</span>
        <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <div class="ms-drop" id="drop-week"></div>
    </div>
  </div>
</div>

<div style="display:flex;min-height:100vh">

  <!-- SIDEBAR -->
  <aside style="width:220px;background:var(--surface);border-right:1px solid var(--border);padding:16px">
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Navigation</div>

    <button onclick="showView('dashboard')" class="nav-btn">Dashboard</button>
    <button onclick="showView('khalifa')" class="nav-btn">Khalifa Reviews</button>
    <button onclick="showView('saadiyat')" class="nav-btn">Saadiyat Reviews</button>
  </aside>

  <!-- MAIN VIEW -->
  <div style="flex:1">

    <!-- DASHBOARD -->
    <div id="view-dashboard">
      <main id="mainContent">
        <div class="loading" style="margin-top:2rem">Loading data...</div>
      </main>
    </div>

    <!-- KHALIFA -->
    <div id="view-khalifa" style="display:none">
  <iframe src="khalifa.html" style="width:100%;height:100vh;border:none;"></iframe>
</div>

    <!-- SAADIYAT -->
    <div id="view-saadiyat" style="display:none">
  <iframe src="saadiyat.html" style="width:100%;height:100vh;border:none;"></iframe>
</div>

  </div>

</div>

<footer>Tara Rose Salon &nbsp;·&nbsp; Internal Dashboard &nbsp;·&nbsp; Confidential<br><span style="opacity:0.5">Dashboard designed by Kate Alsaybar</span></footer>

<script>

function showView(view){
  document.getElementById('view-dashboard').style.display='none';
  document.getElementById('view-khalifa').style.display='none';
  document.getElementById('view-saadiyat').style.display='none';

  document.getElementById('view-'+view).style.display='block';
}
  
const SUPA_URL='https://gvijxenafoowajqktqvd.supabase.co';
const SUPA_KEY='sb_publishable_e5o0vPayb-6552oARTeu7Q_KoqfT7xO';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

const TARGETS={hairAvgBill:650,beautyAvgBill:200,treatmentPct:20,retailPct:12,rebookPct:45};
const BRANCH_INFO={
  KCA:{name:'Khalifa City',color:'#FFD4D9'},
  SAA:{name:'Saadiyat',color:'#C4B5FD'},
  MC:{name:'Motor City',color:'#99F6E4'},
  AQ:{name:'AQ Ladies',color:'#FF9B9B'},
  FRT:{name:'Fratelli',color:'#EEF3C7'},
};
const SCOLS=['#FFD4D9','#FF9B9B','#C4B5FD','#99F6E4','#EEF3C7','#FFB6C1','#B5EAD7','#FFDAC1'];
const MONTH_ORDER=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let allData=[];
let charts={};
const sel={branch:['all'],year:['all'],month:['all'],week:['all']};

function toggleTheme(){
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',dark?'light':'dark');
  document.getElementById('themeLbl').textContent=dark?'Light':'Dark';
  if(Object.keys(charts).length) renderDashboard();
}
const isDark=()=>document.documentElement.getAttribute('data-theme')==='dark';

const sc=(v,t)=>{const p=v/t;return p>=0.95?'good':p>=0.75?'warn':'bad';};
const fmtAED=n=>'AED '+Math.round(n||0).toLocaleString();
const fmtPct=n=>(+(n||0)).toFixed(1)+'%';
const initials=name=>name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

function getYear(label,uploaded_at){
  const m=label&&label.match(/20\d\d/);
  if(m)return m[0];
  return uploaded_at?new Date(uploaded_at).getFullYear().toString():'2026';
}
function getMonth(label,uploaded_at){
  for(const mo of MONTH_ORDER){if(label&&label.includes(mo))return mo;}
  if(uploaded_at)return new Date(uploaded_at).toLocaleDateString('en-GB',{month:'short'});
  return '—';
}

function toggleDrop(key){
  const drop=document.getElementById('drop-'+key);
  const btn=document.getElementById('btn-'+key);
  const isOpen=drop.classList.contains('open');
  document.querySelectorAll('.ms-drop').forEach(d=>d.classList.remove('open'));
  document.querySelectorAll('.ms-btn').forEach(b=>b.classList.remove('open'));
  if(!isOpen){drop.classList.add('open');btn.classList.add('open');}
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.ms-wrap')){
    document.querySelectorAll('.ms-drop').forEach(d=>d.classList.remove('open'));
    document.querySelectorAll('.ms-btn').forEach(b=>b.classList.remove('open'));
  }
});

function buildDrop(key,options){
  const drop=document.getElementById('drop-'+key);
  const isAll=sel[key].includes('all');
  drop.innerHTML=`
  <div class="ms-opt all-opt ${isAll?'selected':''}" data-val="all" onclick="toggleOpt('${key}','all')">All Branches</div>
  ${options.map(o=>{
      const active=!isAll&&sel[key].includes(o.val);
      const dot=BRANCH_INFO[o.val]?`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${BRANCH_INFO[o.val].color};flex-shrink:0;margin-right:2px"></span>`:'';
      return `<div class="ms-opt ${active?'selected':''}" data-val="${o.val}" onclick="toggleOpt('${key}','${o.val}')">${dot}${o.label}</div>`;
    }).join('')}`;
  updateLabel(key,options);
}

function toggleOpt(key,val){
  if(val==='all'){sel[key]=['all'];}
  else{
    sel[key]=sel[key].filter(x=>x!=='all');
    if(sel[key].includes(val)) sel[key]=sel[key].filter(x=>x!==val);
    else sel[key].push(val);
    if(!sel[key].length) sel[key]=['all'];
  }
  if(key==='branch'||key==='year'){sel.month=['all'];}
  if(key==='branch'||key==='year'||key==='month'){sel.week=['all'];}
  rebuildDependentDrops();
  const drop=document.getElementById('drop-'+key);
  const isAllNow=sel[key].includes('all');
  drop.querySelectorAll('.ms-opt').forEach(el=>{
    const v=el.dataset.val;
    if(el.classList.contains('all-opt')) el.classList.toggle('selected',isAllNow);
    else el.classList.toggle('selected',!isAllNow&&sel[key].includes(v));
  });
  drop.classList.add('open');
  document.getElementById('btn-'+key).classList.add('open');
  const allOptions=[...drop.querySelectorAll('.ms-opt:not(.all-opt)')].map(el=>({val:el.dataset.val,label:el.textContent.trim()}));
  updateLabel(key,allOptions);
  renderDashboard();
}

function updateLabel(key,options){
  const lbl=document.getElementById('lbl-'+key);
  const isAll=sel[key].includes('all');
  if(isAll){
  lbl.textContent = key === 'branch' ? 'All Branches' : 'All ' + key + 's';
}
  else if(sel[key].length===1){const found=options.find(o=>o.val===sel[key][0]);lbl.textContent=found?found.label:sel[key][0];}
  else{lbl.textContent=sel[key].length+' selected';}
}

function rebuildDependentDrops(){
  const years=[...new Set(allData.map(d=>getYear(d.week_label,d.uploaded_at)))].sort((a,b)=>b-a);
  buildDrop('year',years.map(y=>({val:y,label:y})));
  const f1=getFilteredData(false,true);
  const months=[...new Set(f1.map(d=>getMonth(d.week_label,d.uploaded_at)))].filter(m=>m!=='—').sort((a,b)=>MONTH_ORDER.indexOf(a)-MONTH_ORDER.indexOf(b));
  buildDrop('month',months.map(m=>({val:m,label:m})));
  const f2=allData.filter(d=>{
    const yr=getYear(d.week_label,d.uploaded_at);
    const mo=getMonth(d.week_label,d.uploaded_at);
    if(!sel.year.includes('all')&&!sel.year.includes(yr))return false;
    if(!sel.month.includes('all')&&!sel.month.includes(mo))return false;
    return true;
  });
  const seenLabels=new Set();
  const weeks=f2.filter(d=>{if(seenLabels.has(d.week_label))return false;seenLabels.add(d.week_label);return true;}).map(d=>({val:d.week_label,label:d.week_label}));
  buildDrop('week',weeks);
}

function getFilteredData(ignoreBranch=false,ignoreMonth=false,ignoreWeek=false){
  return allData.filter(d=>{
    if(!ignoreBranch&&!sel.branch.includes('all')&&!sel.branch.includes(d.branch))return false;
    const yr=getYear(d.week_label,d.uploaded_at);
    if(!sel.year.includes('all')&&!sel.year.includes(yr))return false;
    const mo=getMonth(d.week_label,d.uploaded_at);
    if(!ignoreMonth&&!sel.month.includes('all')&&!sel.month.includes(mo))return false;
    if(!ignoreWeek&&!sel.week.includes('all')&&!sel.week.includes(d.week_label))return false;
    return true;
  });
}

async function loadData(){
  const{data,error}=await sb.from('weekly_data').select('*').order('uploaded_at',{ascending:true});
  if(error||!data){document.getElementById('mainContent').innerHTML='<div class="empty">No data available yet.</div>';return;}
  allData=data;
  const branches=Object.entries(BRANCH_INFO).map(([k,v])=>({val:k,label:v.name}));
  buildDrop('branch',branches);
  rebuildDependentDrops();
  renderDashboard();
  if(data.length){
    const latest=new Date(data[data.length-1].uploaded_at);
    document.getElementById('lastUpdated').innerHTML='Updated '+latest.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})+'<br><span style="font-size:10px;letter-spacing:0.04em;opacity:0.7">Gulf Standard Time +04:00</span>';
  }
}

function aggData(datasets){
  if(!datasets.length)return null;
  const hairMap={},beautyMap={};
  const s={totalClients:0,hairRetail:0,treatmentSales:0,colTake:0,beautySales:0,netTake:0,colPct:0,rebookPct:0};
  let totalRebooked=0,totalHairClients=0;
  datasets.forEach(d=>{
    if(!d)return;
    const sm=d.summary||{};
    s.totalClients+=sm.totalClients||0;s.hairRetail+=sm.hairRetail||0;s.treatmentSales+=sm.treatmentSales||0;
    s.colTake+=sm.colTake||0;s.beautySales+=sm.beautySales||0;s.netTake+=sm.netTake||0;
    if(sm.totals){totalRebooked+=sm.totals.rebooked||0;totalHairClients+=sm.totals.total||0;}
    (d.hairStaff||[]).forEach(st=>{
      if(!hairMap[st.name])hairMap[st.name]={...st};
      else{const a=hairMap[st.name];a.total+=st.total;a.newC+=st.newC;a.rebooked+=st.rebooked;a.hairSalesNet+=st.hairSalesNet;a.retail+=st.retail;a.treatments+=st.treatments;}
    });
    (d.beautyStaff||[]).forEach(st=>{
      if(!beautyMap[st.name])beautyMap[st.name]={...st};
      else{beautyMap[st.name].total+=st.total;beautyMap[st.name].beautySales+=st.beautySales;}
    });
  });
  s.avgBill=s.totalClients?(s.netTake/s.totalClients):0;
  s.treatmentPct=s.netTake?(s.treatmentSales/s.netTake*100):0;
  s.hairRetailPct=s.netTake?(s.hairRetail/s.netTake*100):0;
  s.rebookPct=totalHairClients?(totalRebooked/totalHairClients*100):0;
  s.beautyPct=s.netTake?(s.beautySales/s.netTake*100):0;
  const hairStaff=Object.values(hairMap).map((st,i)=>({...st,avgBill:st.total?st.hairSalesNet/st.total:0,rebookPct:st.total?(st.rebooked/st.total*100):0,color:SCOLS[i%SCOLS.length]}));
  const beautyStaff=Object.values(beautyMap).map((st,i)=>({...st,avgBill:st.total?st.beautySales/st.total:0,rebookPct:st.rebookPct||0,color:SCOLS[(i+3)%SCOLS.length]}));
  return{summary:s,hairStaff,beautyStaff};
}

function aggByBranch(){
  const result={};
  Object.keys(BRANCH_INFO).forEach(code=>{
    const rows=allData.filter(d=>{
      if(d.branch!==code)return false;
      const yr=getYear(d.week_label,d.uploaded_at);
      const mo=getMonth(d.week_label,d.uploaded_at);
      if(!sel.year.includes('all')&&!sel.year.includes(yr))return false;
      if(!sel.month.includes('all')&&!sel.month.includes(mo))return false;
      if(!sel.week.includes('all')&&!sel.week.includes(d.week_label))return false;
      return true;
    });
    result[code]=aggData(rows.map(d=>d.data));
  });
  return result;
}

      <span class="bar-pct">${fmtPct(st.rebookPct)}</span>
    </div>`).join('');
  document.getElementById('rebookBarsLeft').innerHTML=avgHTML+barHTML(sortedRebook.slice(0,half));
  document.getElementById('rebookBarsRight').innerHTML=barHTML(sortedRebook.slice(half));

  // ── COMBO ──
  let comboMetric='hairSalesNet';
  let comboTeam='hair';
  buildCombo(d.hairStaff,comboMetric,dark,ttStyle,gc,tc);
  window._comboHairStaff=d.hairStaff;
  window._comboBeautyStaff=d.beautyStaff;
  window._comboDark=dark;window._comboTT=ttStyle;window._comboGC=gc;window._comboTC=tc;

  window.switchComboTab=function(team){
    comboTeam=team;
    document.getElementById('comboTabHair').classList.toggle('active',team==='hair');
    document.getElementById('comboTabBeauty').classList.toggle('active',team==='beauty');
    const filters=document.getElementById('comboFilters');
    if(team==='beauty'){
      filters.innerHTML=`<button class="f-pill active" data-m="beautySales">Revenue</button><button class="f-pill" data-m="total">Clients</button><button class="f-pill" data-m="avgBill">Avg Bill</button><button class="f-pill" data-m="rebookPct">Rebook %</button>`;
      comboMetric='beautySales';
    } else {
      filters.innerHTML=`<button class="f-pill active" data-m="hairSalesNet">Revenue</button><button class="f-pill" data-m="total">Clients</button><button class="f-pill" data-m="avgBill">Avg Bill</button><button class="f-pill" data-m="rebookPct">Rebook %</button>`;
      comboMetric='hairSalesNet';
    }
    if(charts.combo)charts.combo.destroy();
    buildCombo(comboTeam==='hair'?window._comboHairStaff:window._comboBeautyStaff,comboMetric,window._comboDark,window._comboTT,window._comboGC,window._comboTC);
    attachComboFilter();
  };
  attachComboFilter();
  function attachComboFilter(){
    document.getElementById('comboFilters').addEventListener('click',e=>{
      const btn=e.target.closest('.f-pill');if(!btn)return;
      comboMetric=btn.dataset.m;
      document.querySelectorAll('#comboFilters .f-pill').forEach(p=>p.classList.toggle('active',p===btn));
      if(charts.combo)charts.combo.destroy();
      buildCombo(comboTeam==='hair'?window._comboHairStaff:window._comboBeautyStaff,comboMetric,dark,ttStyle,gc,tc);
    });
  }
}

// ── TOP 3 INLINE (for AQ + FRT in row 3) ──
function renderTop3InlineCard(code,branchData,byBranch){
  const hairStaff=branchData?branchData.hairStaff:[];
  const beautyStaff=branchData?branchData.beautyStaff:[];
  const body=document.getElementById('t3_'+code+'_inline');
  if(!body)return;
  const tabsDiv=document.createElement('div');
  tabsDiv.className='top3-metric-tabs';
  tabsDiv.innerHTML=TOP3_METRICS.map((m,i)=>`<button class="top3-tab${i===0?' active':''}" data-m="${m.key}" onclick="switchTop3Inline('${code}',this,'${m.key}')">${m.label}</button>`).join('');
  body.innerHTML=renderTop3Col(hairStaff,beautyStaff,'overall',code+'i');
  body.prepend(tabsDiv);
}

window.switchTop3Inline=function(code,btn,metricKey){
  btn.closest('.top3-metric-tabs').querySelectorAll('.top3-tab').forEach(t=>t.classList.toggle('active',t===btn));
  const body=document.getElementById('t3_'+code+'_inline');
  const tabsDiv=body.querySelector('.top3-metric-tabs');
  const byBranch=aggByBranch();
  const bd=byBranch[code];
  const hairStaff=bd?bd.hairStaff:[];
  const beautyStaff=bd?bd.beautyStaff:[];
  [...body.children].forEach(c=>{if(c!==tabsDiv)c.remove();});
  body.insertAdjacentHTML('beforeend',renderTop3Col(hairStaff,beautyStaff,metricKey,code+'i'));
  btn.classList.add('active');
};

function buildCmpChart(byBranch,metric,dark,ttStyle,gc,tc){
  const activeBranches=sel.branch.includes('all')?Object.keys(BRANCH_INFO):sel.branch;
  const labels=activeBranches.map(b=>BRANCH_INFO[b]?.name||b);
  const vals=activeBranches.map(b=>{const d=byBranch[b];if(!d)return 0;return +(d.summary[metric]||0).toFixed(1);});
  const colors=activeBranches.map(b=>BRANCH_INFO[b]?.color||'#ccc');
  const metricLabels={netTake:'Revenue (AED)',totalClients:'Clients',avgBill:'Avg Bill (AED)',rebookPct:'Rebook %',treatmentPct:'Treatment %'};
  charts.cmp=new Chart(document.getElementById('cmpChart'),{
    type:'bar',
    data:{labels,datasets:[{label:metricLabels[metric]||metric,data:vals,backgroundColor:colors.map(c=>c+'cc'),borderColor:colors,borderWidth:1.5,borderRadius:8}]},
    options:{animation:{duration:500,easing:'easeInOutQuart'},responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:ttStyle},scales:{x:{ticks:{color:tc,font:{family:'DM Sans',size:11}},grid:{color:gc}},y:{ticks:{color:tc,font:{family:'DM Sans',size:11}},grid:{color:gc}}}}
  });
}

const TOP3_METRICS=[{key:'overall',label:'Overall'},{key:'hairSalesNet',label:'Revenue'},{key:'rebookPct',label:'Rebook %'},{key:'avgBill',label:'Avg Bill'},{key:'total',label:'Clients'}];
const rankColors=['gold','silver','bronze'];
const rankSymbols=['🥇','🥈','🥉'];

function overallScore(st,isBeauty){
  return isBeauty?(st.beautySales||0)/10000+(st.avgBill||0)/200+(st.rebookPct||0):(st.hairSalesNet||0)/10000+(st.avgBill||0)/650+(st.rebookPct||0);
}
function getTop3(staff,metricKey,isBeauty){
  return [...staff].sort((a,b)=>{
    if(metricKey==='overall') return overallScore(b,isBeauty)-overallScore(a,isBeauty);
    const ka=isBeauty&&metricKey==='hairSalesNet'?'beautySales':metricKey;
    return (b[ka]||0)-(a[ka]||0);
  }).slice(0,3);
}

// ── TOP 3 ROWS 1-3 (KCA, SAA, MC only) ──
function renderTop3(byBranch){
  const activeBranches=sel.branch.includes('all')?Object.keys(BRANCH_INFO):sel.branch;
  // Only show KCA, SAA, MC in the top row (AQ & FRT handled in row 3)
  const mainBranches=activeBranches.filter(b=>b!=='AQ'&&b!=='FRT');
  const extraBranches=activeBranches.filter(b=>b==='AQ'||b==='FRT');

  function colHTML(code){
    const info=BRANCH_INFO[code]||{name:code,color:'#ccc'};
    const bd=byBranch[code];
    const hairStaff=bd?bd.hairStaff:[];
    const beautyStaff=bd?bd.beautyStaff:[];
    return `<div class="top3-col">
      <div class="top3-col-hdr"><div class="top3-col-name">${info.name}</div><div class="top3-accent" style="background:${info.color}"></div></div>
      <div class="top3-col-body" id="t3_${code}">${renderTop3Col(hairStaff,beautyStaff,'overall',code)}</div>
    </div>`;
  }

  document.getElementById('top3Grid').innerHTML=mainBranches.map(colHTML).join('');
  // Hide row2 — AQ & FRT now live in row 3
  document.getElementById('top3Grid2').style.display='none';

  mainBranches.forEach(code=>{
    const bd=byBranch[code];
    const hairStaff=bd?bd.hairStaff:[];
    const beautyStaff=bd?bd.beautyStaff:[];
    const body=document.getElementById('t3_'+code);
    const tabsDiv=document.createElement('div');
    tabsDiv.className='top3-metric-tabs';
    tabsDiv.innerHTML=TOP3_METRICS.map((m,i)=>`<button class="top3-tab${i===0?' active':''}" data-m="${m.key}" onclick="switchTop3('${code}',this,'${m.key}')">${m.label}</button>`).join('');
    body.prepend(tabsDiv);
  });
}

function renderTop3Col(hairStaff,beautyStaff,metricKey,code){
  const hair=getTop3(hairStaff,metricKey,false);
  const beauty=getTop3(beautyStaff,metricKey,true);
  return `
    <div class="top3-subtabs">
      <button class="top3-subtab active" onclick="switchTop3Sub('${code}',this,'hair')">Hair</button>
      <button class="top3-subtab" onclick="switchTop3Sub('${code}',this,'beauty')">Beauty</button>
    </div>
    <div id="t3hair_${code}">${hair.length?hair.map((st,i)=>top3ItemHTML(st,i,metricKey,false)).join(''):'<div class="top3-empty">No data</div>'}</div>
    <div id="t3beauty_${code}" style="display:none">${beauty.length?beauty.map((st,i)=>top3ItemHTML(st,i,metricKey,true)).join(''):'<div class="top3-empty">No data</div>'}</div>`;
}

function top3ItemHTML(st,i,metricKey,isBeauty){
  const val=isBeauty
    ?(metricKey==='hairSalesNet'?fmtAED(st.beautySales):metricKey==='rebookPct'?fmtPct(st.rebookPct):metricKey==='avgBill'?fmtAED(st.avgBill):metricKey==='total'?st.total+' clients':fmtAED(st.beautySales))
    :(metricKey==='rebookPct'?fmtPct(st.rebookPct):metricKey==='avgBill'?fmtAED(st.avgBill):metricKey==='total'?st.total+' clients':fmtAED(st.hairSalesNet));
  return `<div class="top3-item">
    <span class="top3-rank ${rankColors[i]}">${rankSymbols[i]}</span>
    <div class="top3-av" style="background:${st.color}">${initials(st.name)}</div>
    <div class="top3-info"><div class="top3-name">${st.name}</div><div class="top3-val">${val}</div></div>
  </div>`;
}

function switchTop3(code,btn,metricKey){
  btn.closest('.top3-metric-tabs').querySelectorAll('.top3-tab').forEach(t=>t.classList.toggle('active',t===btn));
  const body=document.getElementById('t3_'+code);
  const tabsDiv=body.querySelector('.top3-metric-tabs');
  const bd=aggByBranch()[code];
  const hairStaff=bd?bd.hairStaff:[];
  const beautyStaff=bd?bd.beautyStaff:[];
  [...body.children].forEach(c=>{if(c!==tabsDiv)c.remove();});
  body.insertAdjacentHTML('beforeend',renderTop3Col(hairStaff,beautyStaff,metricKey,code));
  btn.classList.add('active');
}

function switchTop3Sub(code,btn,tab){
  btn.closest('.top3-subtabs').querySelectorAll('.top3-subtab').forEach(t=>t.classList.toggle('active',t===btn));
  document.getElementById('t3hair_'+code).style.display=tab==='hair'?'':'none';
  document.getElementById('t3beauty_'+code).style.display=tab==='beauty'?'':'none';
}

function buildCombo(staff,metric,dark,ttStyle,gc,tc){
  const labels=staff.map(s=>s.name.split(' ')[0]);
  const vals=staff.map(s=>+(s[metric]||0).toFixed(1));
  const avg=vals.reduce((a,b)=>a+b,0)/(vals.length||1);
  const lc=dark?'#C4B5FD':'#5C5557';
  charts.combo=new Chart(document.getElementById('comboChart'),{
    data:{labels,datasets:[
      {type:'bar',label:{hairSalesNet:'Revenue (AED)',beautySales:'Revenue (AED)',total:'Clients',avgBill:'Avg Bill (AED)',rebookPct:'Rebook %'}[metric]||metric,data:vals,backgroundColor:staff.map(s=>s.color+'cc'),borderColor:staff.map(s=>s.color),borderWidth:1.5,borderRadius:6,yAxisID:'y'},
      {type:'line',label:'Team Avg',data:vals.map(()=>+avg.toFixed(1)),borderColor:lc,backgroundColor:'transparent',borderWidth:2,borderDash:[6,4],pointRadius:0,tension:0,yAxisID:'y'}
    ]},
    options:{animation:{duration:500,easing:'easeInOutQuart'},responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{labels:{color:tc,font:{family:'DM Sans',size:11},boxWidth:12}},tooltip:ttStyle},scales:{x:{ticks:{color:tc,font:{family:'DM Sans',size:11}},grid:{color:gc}},y:{ticks:{color:tc,font:{family:'DM Sans',size:11}},grid:{color:gc}}}}
  });
}

function switchTab(el,tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-hair').style.display=tab==='hair'?'':'none';
  document.getElementById('tab-beauty').style.display=tab==='beauty'?'':'none';
}

loadData();
setInterval(loadData,60000);
</script>
</body>
